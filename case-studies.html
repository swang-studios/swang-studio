<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Case Studies — Mason Swanger</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#ffffff; --ink:#000000; --mute:#6e6e6e; --rule:rgba(0,0,0,0.10); }
  html, body { min-height: 100%; }
  body {
    font-family: 'Hanken Grotesk', -apple-system, system-ui, sans-serif;
    font-size: 14px; line-height: 1.5; color: var(--ink); background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--ink); color: var(--bg); }
  a { color: inherit; text-decoration: none; }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 50;
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; padding: 18px 28px;
    border-bottom: 1px solid var(--rule);
    background: var(--bg); gap: 32px;
  }
  .name {
    justify-self: start; font-weight: 700; font-size: 15px;
    letter-spacing: -0.025em; color: var(--ink);
    border-bottom: 1px solid transparent; padding-bottom: 1px;
    transition: border-color 150ms;
  }
  .name:hover { border-bottom-color: var(--ink); }
  .typer-wrap {
    justify-self: center; display: inline-flex; align-items: center;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap;
  }
  #typer { color: var(--ink); font-weight: 600; }
  .cursor {
    display: inline-block; width: 7px; height: 14px; background: var(--ink);
    margin-left: 3px; transform: translateY(2px);
    animation: blink 1.05s steps(2, start) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  nav.primary { justify-self: end; display: flex; align-items: center; gap: 18px; }
  nav.primary a {
    font-size: 13px; font-weight: 500; letter-spacing: -0.005em;
    color: var(--ink); padding: 4px 0;
    border-bottom: 1px solid transparent;
    transition: border-color 150ms; white-space: nowrap;
  }
  nav.primary a:hover, nav.primary a.active { border-bottom-color: var(--ink); }
  nav.primary .pipe { color: var(--rule); font-weight: 300; user-select: none; }

  /* Blank stage — entries to be added back */
  .empty-stage { min-height: calc(100vh - 120px); }

  /* PAGE HEAD (unused now — kept for future restoration) */
  .page-head { padding: 64px 28px 40px; border-bottom: 1px solid var(--rule); }
  .page-head-inner { max-width: 1200px; margin: 0 auto; }
  .page-title {
    font-weight: 800; font-size: clamp(48px, 7vw, 88px);
    line-height: 0.98; letter-spacing: -0.04em; color: var(--ink);
  }
  .page-sub {
    margin-top: 18px; font-size: clamp(16px, 1.6vw, 20px);
    line-height: 1.5; color: var(--ink); font-weight: 500;
    letter-spacing: -0.01em;
  }

  /* STUDIES — thumbnail-left, result-right cards */
  .studies {
    max-width: 1200px; margin: 0 auto;
    padding: 24px 28px 96px;
    list-style: none;
  }
  .study {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 44px;
    padding: 36px 0;
    border-bottom: 1px solid var(--rule);
    align-items: center;
  }
  .study:last-child { border-bottom: none; }
  .study .thumb {
    aspect-ratio: 16 / 9;
    background: #f6f6f4;
    border: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .study .thumb img {
    max-width: 64%; max-height: 64%;
    width: auto; height: auto;
    object-fit: contain; display: block;
  }
  .study .thumb.empty { background: #f6f6f4; }
  .study .body {
    display: flex; flex-direction: column; gap: 10px;
  }
  .study .name {
    font-weight: 800; font-size: clamp(24px, 2.6vw, 34px);
    line-height: 1.08; letter-spacing: -0.025em; color: var(--ink);
  }
  .study .result {
    font-size: clamp(15px, 1.3vw, 17px); line-height: 1.6;
    color: var(--ink); max-width: 62ch;
  }

  /* FOOTER */
  footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px; border-top: 1px solid var(--rule);
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--ink); gap: 16px; flex-wrap: wrap;
  }
  footer a { border-bottom: 1px solid transparent; transition: border-color 150ms; }
  footer a:hover { border-bottom-color: var(--ink); }
  footer .sep { color: var(--mute); margin: 0 8px; }

  @media (max-width: 980px) {
    header { grid-template-columns: auto 1fr; gap: 14px; }
    .typer-wrap { display: none; }
    nav.primary { justify-self: end; gap: 12px; }
    nav.primary a { font-size: 12px; }
    .study { grid-template-columns: 220px 1fr; gap: 24px; }
  }
  @media (max-width: 760px) {
    .page-head { padding: 36px 20px 24px; }
    .studies { padding: 12px 20px 56px; }
    .study { grid-template-columns: 1fr; gap: 16px; padding: 28px 0; }
    .study .thumb { max-width: 360px; }
    .study .name { font-size: 24px; }
  }
  @media (max-width: 520px) {
    header { padding: 14px 18px; }
    nav.primary .pipe { display: none; }
    nav.primary a { font-size: 11px; }
    footer { padding: 12px 18px; font-size: 10px; flex-direction: column; align-items: flex-start; gap: 4px; }
  }
</style>
</head>
<body>

<header>
  <a href="./index.html" class="name">Mason Swanger</a>
  <div class="typer-wrap" aria-hidden="true">
    <span id="typer">Meta Creatives</span>
    <span class="cursor"></span>
  </div>
  <nav class="primary">
    <a href="./gallery.html">Gallery</a>
    <span class="pipe">|</span>
    <a href="./case-studies.html" class="active">Case Studies</a>
    <span class="pipe">|</span>
    <a href="./clients.html">Clients</a>
  </nav>
</header>

<main class="empty-stage" aria-label="Case Studies (entries pending)"></main>

<footer>
  <span><a href="mailto:hello@swang.studio">hello@swang.studio</a></span>
  <span>Los Angeles, CA</span>
</footer>

<script>
  (function () {
    const el = document.getElementById('typer');
    const phrases = ['Meta Creatives','Brand Visibility','Content Creation','Graphic Design','Advertising Strategy','Metric & Analytics'];
    const typeSpeed=110, deleteSpeed=55, holdEnd=3400, holdStart=800;
    let p=0, c=0, del=false;
    function tick(){
      const ph=phrases[p]; c+=del?-1:1;
      el.textContent=ph.substring(0,c);
      if(!del&&c===ph.length){del=true;setTimeout(tick,holdEnd);return;}
      if(del&&c===0){del=false;p=(p+1)%phrases.length;setTimeout(tick,holdStart);return;}
      setTimeout(tick,del?deleteSpeed:typeSpeed);
    }
    el.textContent=''; setTimeout(tick,600);
  })();
</script>

</body>
</html>
