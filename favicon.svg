<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Supreme-inspired mark: solid black square, bold italic serif "S" in white.
       Uses a generic condensed serif stack so no font download is required for favicons. -->
  <rect x="0" y="0" width="200" height="200" fill="#000000"/>
  <text x="100" y="152" text-anchor="middle"
        font-family="Times New Roman, Times, Georgia, serif"
        font-style="italic"
        font-weight="700"
        font-size="170"
        fill="#ffffff">S</text>
</svg>
