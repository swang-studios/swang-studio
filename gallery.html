<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>
    // Default to dark; apply saved theme before paint (only go light if user explicitly chose it).
    try { if (localStorage.getItem('swang-theme') !== 'light') document.documentElement.setAttribute('data-theme', 'dark'); } catch(e) { document.documentElement.setAttribute('data-theme', 'dark'); }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>swang. | Creative Growth — Gallery</title>
  <meta name="description" content="The full gallery — aerial, landscape, portrait, and brand work by Mason Swang." />
  <meta property="og:title" content="Gallery, swang." />
  <meta property="og:description" content="Aerial, landscape, portrait, and brand photography by Mason Swang." />
  <meta property="og:url" content="https://www.swang.studio/gallery" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      /* Icy-white gallery palette (Apr 20 repaint). Keeps the existing
         --mocha-*/--cream-* variable NAMES so downstream rules don't need
         a rewrite — they now map to icy-white + slate + baby-blue. */
      --mocha-deep: #0b0e14;   /* near-black gallery chrome (was mocha deep) */
      --mocha-mid:  #1a2230;   /* deep navy-ink (was mocha mid) */
      --mocha-warm: #2a3348;   /* cool graphite (was mocha warm) */
      --cream:      #0b0e14;   /* near-black text-on-light (was cream) */
      --cream-2:    #0b0e14;   /* near-black headline (was cream-2) */
      --cream-dim:  rgba(11, 14, 20, 0.72);  /* graphite body text */
      --ice:        #5DB3E8;   /* primary baby blue */
      --ice-2:      #2E7FC2;   /* deeper ocean blue */
      --ice-soft:   rgba(93, 179, 232, 0.14);
      --ice-mid:    rgba(93, 179, 232, 0.30);
      --ice-line:   rgba(93, 179, 232, 0.55);
      --ice-glow:   rgba(46, 127, 194, 0.38);
      /* Page surfaces (new tokens so the gallery can switch to an icy-white
         base without reworking every background-color reference) */
      --page-bg:    #f5f8fc;
      --page-bg-2:  #eef3f9;
      --page-bg-3:  #e4ecf5;
      /* Legacy aliases used by other sections */
      --ink: var(--cream);
      --ink-2: var(--cream-dim);
      --muted: rgba(11, 14, 20, 0.55);
      --accent: var(--ice);
      --accent-2: var(--ice-2);
      --blue-1: var(--ice-soft);
      --blue-2: var(--ice-mid);
      --blue-line: var(--ice-line);
      --rule: rgba(11, 14, 20, 0.12);
      /* 80s Mac Rainbow accent (used on nav top pinstripe) */
      --mac-green:  #6ABE4F;
      --mac-yellow: #F5C419;
      --mac-orange: #F08A2E;
      --mac-red:    #E5484D;
      --mac-purple: #8A5FC2;
      --mac-blue:   #3E9BDB;
    }

    /* ----- FROZONE AFTER HOURS — night-mode override -------------------- */
    html[data-theme="dark"] {
      --mocha-deep: #eaf3fb;
      --mocha-mid:  #b8c8dc;
      --mocha-warm: #7a8ba5;
      --cream:      #eaf3fb;
      --cream-2:    #ffffff;
      --cream-dim:  rgba(234,243,251,0.9);
      --ice:        #6FC3F2;
      --ice-2:      #9FD4F5;
      --ice-soft:   rgba(111,195,242,0.14);
      --ice-mid:    rgba(111,195,242,0.28);
      --ice-line:   rgba(159,212,245,0.55);
      --ice-glow:   rgba(159,212,245,0.38);
      --page-bg:    #0b1628;
      --page-bg-2:  #0f1c33;
      --page-bg-3:  #142340;
      --muted:      rgba(234,243,251,0.5);
      --rule:       rgba(234,243,251,0.12);
    }
    html[data-theme="dark"] body { background: var(--page-bg); color: var(--cream); }
    html[data-theme="dark"] nav {
      background: rgba(14, 25, 44, 0.72);
      border-bottom-color: rgba(159,212,245,0.14);
    }

    /* Dark-mode pass for the masonry / outro chrome. The base page uses an
       icy-white wash + dark-on-light rules; dark mode needs a navy wash and
       dark-on-light rules flipped to light-on-dark so captions, section
       titles, dividers, and the outro card don't vanish. */
    html[data-theme="dark"] body::before {
      background:
        radial-gradient(ellipse at 18% 22%, rgba(96, 170, 220, 0.16) 0%, transparent 55%),
        radial-gradient(ellipse at 82% 78%, rgba(60, 130, 200, 0.16) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(90, 160, 220, 0.10) 0%, transparent 70%),
        linear-gradient(135deg, #0b1628, #0f1c33 45%, #142340 70%, #0b1628);
      filter: saturate(1.08);
    }
    html[data-theme="dark"] .gallery-divider::before,
    html[data-theme="dark"] .gallery-divider::after { background: rgba(234, 243, 251, 0.14); }
    html[data-theme="dark"] .gallery-divider span  { color: rgba(234, 243, 251, 0.6); }
    html[data-theme="dark"] .g-section::before,
    html[data-theme="dark"] .g-section::after      { background: rgba(234, 243, 251, 0.16); }
    html[data-theme="dark"] .g-section em          { color: #eaf3fb; }
    html[data-theme="dark"] .g-item {
      border-color: rgba(234, 243, 251, 0.08);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    }
    html[data-theme="dark"] .reel-embed {
      border-color: rgba(234, 243, 251, 0.08);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    }
    html[data-theme="dark"] .g-outro {
      background: rgba(14, 25, 44, 0.72);
      border-color: rgba(159, 212, 245, 0.14);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }
    html[data-theme="dark"] .g-outro p { color: rgba(234, 243, 251, 0.85); }
    html[data-theme="dark"] footer {
      border-top-color: rgba(234, 243, 251, 0.12);
    }

    /* Theme toggle — Apr 23 promoted to a labeled Light / Dark pill. */
    body { transition: background-color 0.2s ease, color 0.2s ease; }
    .theme-toggle {
      background: transparent;
      border: 1px solid rgba(11,14,20,0.22);
      height: 32px; border-radius: 999px;
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px;
      margin-left: 18px; padding: 0 10px 0 12px; cursor: pointer;
      color: var(--cream);
      font: inherit;
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }
    .theme-toggle:hover {
      background: var(--page-bg-2);
      border-color: var(--ice-2);
      color: var(--ice-2);
    }
    .theme-toggle .tt-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; line-height: 1;
      opacity: 0.6; transition: opacity 0.2s ease, color 0.2s ease;
    }
    .theme-toggle .tt-label.active { opacity: 1; color: var(--ice-2); }
    .theme-toggle svg { width: 13px; height: 13px; }
    .theme-toggle .sun  { display: none; }
    .theme-toggle .moon { display: inline-block; }
    html[data-theme="dark"] .theme-toggle { border-color: rgba(234,243,251,0.22); }
    html[data-theme="dark"] .theme-toggle .sun  { display: inline-block; }
    html[data-theme="dark"] .theme-toggle .moon { display: none; }
    html[data-theme="dark"] .theme-toggle .tt-label.active { color: var(--ice, #9FD4F5); }
    nav .nav-right { display: flex; align-items: center; gap: 8px; }
    @media (max-width: 960px) {
      nav ul { gap: 20px !important; }
      nav .nav-right { gap: 4px; }
      .theme-toggle { margin-left: 10px; padding: 0 8px; }
    }
    @media (max-width: 760px) {
      .theme-toggle { padding: 0; width: 32px; gap: 0; }
      .theme-toggle .tt-label, .theme-toggle .tt-sep { display: none; }
    }
    @media (max-width: 440px) {
      .theme-toggle { margin-left: 6px; width: 30px; height: 30px; }
      .theme-toggle svg { width: 12px; height: 12px; }
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      background: var(--page-bg);
      color: var(--cream);
      overflow-x: hidden;
    }
    /* slow icy drift — calm sky-blue wash behind the masonry grid */
    body::before {
      content: ''; position: fixed; inset: -10%; z-index: -1;
      background:
        radial-gradient(ellipse at 18% 22%, #e4f1fb 0%, transparent 55%),
        radial-gradient(ellipse at 82% 78%, #dde7f2 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, #ffffff 0%, transparent 70%),
        linear-gradient(135deg, #f5f8fc, #eef3f9 45%, #e4ecf5 70%, #f5f8fc);
      background-size: 180% 180%;
      animation: lavaDrift 120s ease-in-out infinite alternate;
      pointer-events: none;
      filter: saturate(1.02);
    }
    @keyframes lavaDrift {
      0%   { background-position: 0% 0%; transform: scale(1); }
      50%  { background-position: 40% 60%; transform: scale(1.04); }
      100% { background-position: 100% 100%; transform: scale(1); }
    }

    /* NAV — icy Mac-glass, 80s rainbow pinstripe on top edge */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 44px;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border-bottom: 1px solid rgba(11, 14, 20, 0.08);
    }
    nav::before {
      content: ''; position: absolute; left: 0; right: 0; top: 0;
      height: 3px;
      background: linear-gradient(90deg,
        var(--mac-green)  0%,  var(--mac-green)  16.66%,
        var(--mac-yellow) 16.66%, var(--mac-yellow) 33.33%,
        var(--mac-orange) 33.33%, var(--mac-orange) 50%,
        var(--mac-red)    50%,    var(--mac-red)    66.66%,
        var(--mac-purple) 66.66%, var(--mac-purple) 83.33%,
        var(--mac-blue)   83.33%, var(--mac-blue)   100%);
      opacity: 0.78;
    }
    nav .logo {
      font-size: 20px; font-weight: 700; letter-spacing: -0.5px;
      color: var(--cream); text-decoration: none;
    }
    /* Persistent "Back" pill in the nav-left slot so it rides with the fixed
       nav as the user scrolls the long gallery. */
    .nav-back {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; text-decoration: none;
      color: var(--ink, #0b0e14);
      padding: 8px 16px;
      border: 1px solid rgba(11, 14, 20, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.55);
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s;
    }
    .nav-back .arrow { font-size: 14px; line-height: 1; transition: transform 0.2s; }
    .nav-back:hover {
      background: var(--ink, #0b0e14); color: #fff; border-color: var(--ink, #0b0e14);
    }
    .nav-back:hover .arrow { transform: translateX(-3px); }
    html[data-theme="dark"] .nav-back {
      color: #eaf3fb;
      border-color: rgba(234, 243, 251, 0.22);
      background: rgba(11, 22, 40, 0.45);
    }
    html[data-theme="dark"] .nav-back:hover {
      background: #eaf3fb; color: #0b1628; border-color: #eaf3fb;
    }
    nav ul { list-style: none; display: flex; gap: 30px; }
    nav ul a {
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--cream-dim); text-decoration: none;
      opacity: 0.78; transition: opacity 0.2s, color 0.2s;
    }
    nav ul a:hover { opacity: 1; color: var(--ice); }

    /* Apr 27 — mobile hamburger (gallery parity with home + case-studies).
       Was missing here, so on phones the 4 nav items + Back pill + theme toggle
       all crammed into the top bar and wrapped onto two lines. */
    .nav-burger {
      display: none;
      background: transparent;
      border: 1px solid rgba(11, 14, 20, 0.22);
      width: 38px; height: 38px;
      border-radius: 999px;
      align-items: center; justify-content: center;
      cursor: pointer; padding: 0;
      transition: background 0.2s, border-color 0.2s;
    }
    .nav-burger span,
    .nav-burger span::before,
    .nav-burger span::after {
      content: ''; display: block; width: 18px; height: 1.6px;
      background: var(--ink, #0b0e14); position: relative; border-radius: 2px;
      transition: transform 0.25s ease, opacity 0.2s ease, top 0.2s ease, bottom 0.2s ease;
    }
    .nav-burger span::before { position: absolute; top: -6px; left: 0; }
    .nav-burger span::after  { position: absolute; bottom: -6px; left: 0; }
    body.nav-open .nav-burger span { background: transparent; }
    body.nav-open .nav-burger span::before { top: 0; transform: rotate(45deg); }
    body.nav-open .nav-burger span::after  { bottom: 0; transform: rotate(-45deg); }
    html[data-theme="dark"] .nav-burger { border-color: rgba(159,212,245,0.32); }
    html[data-theme="dark"] .nav-burger span,
    html[data-theme="dark"] .nav-burger span::before,
    html[data-theme="dark"] .nav-burger span::after { background: #eaf3fb; }

    @media (max-width: 760px) {
      .nav-burger { display: inline-flex; }
      nav { padding: 12px 16px; }
      nav ul {
        position: fixed;
        top: 60px; left: 12px; right: 12px;
        flex-direction: column;
        align-items: stretch;
        gap: 0;
        padding: 12px 18px;
        background: rgba(255,255,255,0.96);
        backdrop-filter: blur(22px) saturate(160%);
        -webkit-backdrop-filter: blur(22px) saturate(160%);
        border: 1px solid rgba(11,14,20,0.10);
        border-radius: 14px;
        box-shadow: 0 18px 44px rgba(11,14,20,0.18);
        opacity: 0;
        transform: translateY(-8px);
        pointer-events: none;
        transition: opacity 0.22s ease, transform 0.22s ease;
        z-index: 210;
      }
      nav ul li { width: 100%; }
      nav ul a {
        display: block;
        padding: 14px 6px;
        font-size: 13px;
        letter-spacing: 0.12em;
        border-bottom: 1px solid rgba(11,14,20,0.08);
      }
      nav ul li:last-child a { border-bottom: none; }
      body.nav-open nav ul {
        opacity: 1; transform: translateY(0); pointer-events: auto;
      }
      html[data-theme="dark"] nav ul {
        background: rgba(15, 28, 51, 0.96);
        border-color: rgba(159,212,245,0.18);
      }
      html[data-theme="dark"] nav ul a { border-bottom-color: rgba(234,243,251,0.10); }
      .nav-back { padding: 7px 12px; font-size: 10px; }
    }

    /* HEADER */
    .g-head {
      padding: 130px 44px 32px; max-width: 1200px; margin: 0 auto;
    }
    .g-crumb {
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--ice);
      text-decoration: none; display: inline-flex; align-items: center;
      gap: 8px; margin-bottom: 22px;
      transition: color 0.2s;
    }
    .g-crumb:hover { color: var(--cream-2); }
    .g-title {
      font-size: clamp(36px, 5.5vw, 68px); font-weight: 700;
      letter-spacing: -0.03em; line-height: 1.0; color: var(--cream-2);
    }
    .g-title em {
      color: #ffffff; font-style: normal;
      background: linear-gradient(120deg, var(--ice), var(--ice-2));
      padding: 0 10px; border-radius: 2px;
      box-shadow: 0 2px 18px var(--ice-glow), inset 0 -2px 0 rgba(255,255,255,0.35);
    }
    .g-sub {
      margin-top: 18px; font-size: 15px; line-height: 1.7;
      color: var(--cream-dim); max-width: 640px;
    }

    /* Filter tabs removed — single unified gallery */
    .g-tabs { display: none !important; }

    /* REELS ROW */
    .reels-row { max-width: 1400px; margin: 0 auto; padding: 24px 12px 8px; }
    .reels-head { display: flex; align-items: baseline; gap: 16px; margin-bottom: 16px; padding: 0 4px; }
    .reels-head .reels-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--ice-2, #2E7FC2);
    }
    .reels-head h2 {
      font-size: clamp(22px, 2.6vw, 30px); font-weight: 700;
      letter-spacing: -0.02em; color: var(--ink, #0b0e14);
    }
    .reels-grid {
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px;
    }
    .reel-embed {
      aspect-ratio: 9 / 16;
      background: #0b0e14; overflow: hidden;
      border-radius: 4px; border: 1px solid rgba(11, 14, 20, 0.08);
      box-shadow: 0 6px 18px rgba(11, 14, 20, 0.12);
      transition: transform 0.32s cubic-bezier(.22,.9,.28,1), box-shadow 0.32s;
    }
    .reel-embed:hover { transform: translateY(-4px); box-shadow: 0 18px 42px rgba(11,14,20,0.22); }
    .reel-embed iframe,
    .reel-embed video { width: 100%; height: 100%; border: 0; display: block; object-fit: cover; background: #0b0e14; }
    @media (max-width: 1100px) { .reels-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 720px)  { .reels-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px)  { .reels-grid { grid-template-columns: 1fr; } }

    .gallery-divider {
      max-width: 1400px; margin: 40px auto 0; padding: 0 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .gallery-divider::before,
    .gallery-divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(11, 14, 20, 0.12);
    }
    .gallery-divider span {
      font-size: 10px; font-weight: 700; letter-spacing: 0.22em;
      text-transform: uppercase; color: rgba(11, 14, 20, 0.5);
    }

    /* PUZZLE MASONRY — CSS Grid with JS-driven row spans. Each image
       keeps its natural aspect ratio (no cropping); selected tiles span
       2 columns (.wide/.feature) to break the column rhythm so the page
       reads as a puzzle, not a stack of strict columns. Row spans are
       computed by JS once each image has loaded, so height always
       matches the image's intrinsic proportions. */
    .g-grid {
      max-width: 1400px; margin: 18px auto 40px;
      padding: 0 12px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      grid-auto-rows: 8px;
      grid-auto-flow: dense;
      gap: 12px;
    }
    /* Apr 24 — section TITLES removed per Mason.  Sections remain in the DOM
       as invisible groupings that preserve the project ordering, but no
       visible headers are rendered between them. */
    .g-section { display: block; }

    .g-item {
      display: block;
      overflow: hidden;
      background: var(--page-bg-2);
      position: relative; cursor: pointer;
      border-radius: 3px;
      border: 1px solid rgba(11, 14, 20, 0.08);
      box-shadow: 0 4px 14px rgba(11, 14, 20, 0.10);
      /* default row span — JS overwrites on image load */
      grid-row: span 28;
      /* piano-tile rise/fall — sharp rise, soft settle */
      transition: transform 0.42s cubic-bezier(.18,.9,.24,1.05),
                  box-shadow 0.42s cubic-bezier(.18,.9,.24,1.05),
                  border-color 0.3s ease,
                  z-index 0s linear 0s;
    }
    .g-item:hover {
      transform: translateY(-8px);
      border-color: var(--ice-line);
      box-shadow:
        0 0 0 2px var(--ice-mid),
        0 22px 48px rgba(11, 14, 20, 0.24),
        0 0 44px var(--ice-glow);
      z-index: 2;
    }
    .g-item img {
      /* Natural aspect: width fills the cell; height grows from the
         image's own ratio. No cover-cropping. */
      width: 100%; height: auto; display: block;
      transition: transform 0.7s cubic-bezier(.2,.8,.2,1), filter 0.45s ease;
    }
    .g-item:hover img { transform: scale(1.035); filter: saturate(1.05) brightness(1.02); }

    /* Span modifiers — the puzzle glue. Feature + wide tiles straddle
       two columns; tall still spans 1 col but gets extra vertical weight
       via natural aspect. These jostle the grid out of strict columns. */
    .g-item.wide,
    .g-item.feature {
      grid-column: span 2;
    }
    .g-item.feature {
      border-color: var(--ice-line);
      box-shadow: 0 8px 22px rgba(46, 127, 194, 0.18), 0 2px 6px rgba(11, 14, 20, 0.10);
    }

    /* LIGHTBOX — near-black scrim reads right on an icy page, keeps photos popping */
    .lb {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(11, 14, 20, 0.86);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: none; align-items: center; justify-content: center;
      padding: 32px;
    }
    .lb.open { display: flex; }
    .lb-img {
      max-width: 96vw; max-height: 92vh;
      width: auto; height: auto;
      box-shadow: 0 40px 120px rgba(11,14,20,0.50), 0 0 0 1px rgba(159, 212, 245, 0.20);
      border-radius: 3px;
    }
    .lb-close, .lb-prev, .lb-next {
      position: absolute; background: rgba(255, 255, 255, 0.12);
      color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.28);
      width: 44px; height: 44px; border-radius: 50%;
      cursor: pointer; font-size: 18px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      user-select: none;
    }
    .lb-close:hover, .lb-prev:hover, .lb-next:hover {
      background: var(--ice-soft); border-color: var(--ice-line); color: var(--ice);
    }
    .lb-close { top: 24px; right: 24px; }
    .lb-prev  { left: 24px;  top: 50%; transform: translateY(-50%); }
    .lb-next  { right: 24px; top: 50%; transform: translateY(-50%); }
    .lb-caption {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: #ffffff;
      background: rgba(11, 14, 20, 0.72);
      padding: 8px 14px; border-radius: 2px;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    /* OUTRO CTA */

    /* RESPONSIVE — grid auto-fills at min 240px desktop, 200px tablet,
       170px small tablet, full-bleed single col on phones. Wide/feature
       span-2 tiles collapse to 1 col on small screens so nothing
       spills or breaks. */
    @media (max-width: 1100px) {
      .g-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    }
    @media (max-width: 820px) {

      footer { padding: 28px 20px; flex-direction: column; align-items: flex-start; }

    @media (max-width: 560px) {

<script>
  document.getElementById('yr').textContent = new Date().getFullYear();

  const items = Array.from(document.querySelectorAll('.g-item'));

  // ===== PUZZLE MASONRY — compute grid-row span per tile =====
  // CSS Grid uses auto-rows: 8px + gap: 12px. Each tile's total vertical
  // footprint is: (rows * 8) + ((rows - 1) * 12). We compute the right
  // span from the image's aspect ratio so the tile matches the photo
  // exactly (no cropping, no whitespace under the image).
  //
  // Critical detail: the DOM imgs have loading="lazy" so their own
  // `load` event doesn't fire until they scroll into view. We therefore
  // kick off an in-memory Image() per tile that loads the same src
  // eagerly — we only need naturalWidth/naturalHeight, not the pixels.
  const ROW_H = 8;
  const ROW_GAP = 12;
  const ratioCache = new Map();   // src → h/w ratio (once known)

  function applySpan(item, ratio) {
    const w = item.getBoundingClientRect().width;
    if (!w || !ratio) return;
    const h = w * ratio;
    const rows = Math.ceil((h + ROW_GAP) / (ROW_H + ROW_GAP));
    item.style.gridRow = 'span ' + rows;
  }
  function ensureRatio(src, onReady) {
    if (ratioCache.has(src)) { onReady(ratioCache.get(src)); return; }
    const probe = new Image();
    probe.onload = () => {
      if (probe.naturalWidth && probe.naturalHeight) {
        const r = probe.naturalHeight / probe.naturalWidth;
        ratioCache.set(src, r);
        onReady(r);
      }
    };
    probe.onerror = () => onReady(null);
    probe.src = src;
  }
  function measureTile(item) {
    const img = item.querySelector('img');
    if (!img) return;
    const src = img.getAttribute('src');
    ensureRatio(src, (ratio) => ratio && applySpan(item, ratio));
  }
  function recomputeAll() {
    items.forEach(item => {
      const img = item.querySelector('img');
      if (!img) return;
      const r = ratioCache.get(img.getAttribute('src'));
      if (r) applySpan(item, r); else measureTile(item);
    });
  }
  // Kick off measurement for every tile immediately.
  items.forEach(measureTile);
  // Recompute on resize (column width changes).
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(recomputeAll, 120);
  });
  // Safety pass once page fully loaded.
  window.addEventListener('load', recomputeAll);

  // Lightbox
  const lb = document.getElementById('lb');
  const lbImg = document.getElementById('lbImg');
  const lbCap = document.getElementById('lbCaption');
  let visible = items;
  let idx = 0;
  function open(i) {
    visible = items.filter(x => x.style.display !== 'none');
    idx = visible.indexOf(items[i]);
    if (idx < 0) idx = 0;
    show();
    lb.classList.add('open');
    lb.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }
  function closeLb() {
    lb.classList.remove('open');
    lb.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }
  function show() {
    const img = visible[idx].querySelector('img');
    lbImg.src = img.src;
    lbImg.alt = img.alt || '';
    lbCap.textContent = (visible[idx].dataset.cat || '').toUpperCase();
  }
  function next() { idx = (idx + 1) % visible.length; show(); }
  function prev() { idx = (idx - 1 + visible.length) % visible.length; show(); }
  items.forEach((item, i) => item.addEventListener('click', () => open(i)));
  document.getElementById('lbClose').addEventListener('click', closeLb);
  document.getElementById('lbNext').addEventListener('click', next);
  document.getElementById('lbPrev').addEventListener('click', prev);
  lb.addEventListener('click', (e) => { if (e.target === lb) closeLb(); });
  document.addEventListener('keydown', (e) => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLb();
    else if (e.key === 'ArrowRight') next();
    else if (e.key === 'ArrowLeft') prev();
  });

  // Frozone After Hours theme toggle
  window.swangSyncThemeLabels = function() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.querySelectorAll('.theme-toggle').forEach(function(btn) {
      var light = btn.querySelector('.tt-light');
      var dark  = btn.querySelector('.tt-dark');
      if (light) light.classList.toggle('active', !isDark);
      if (dark)  dark.classList.toggle('active',  isDark);
      btn.setAttribute('aria-pressed', isDark ? 'true' : 'false');
    });
  };
  window.swangToggleTheme = function() {
    var html = document.documentElement;
    var isDark = html.getAttribute('data-theme') === 'dark';
    if (isDark) {
      html.removeAttribute('data-theme');
      try { localStorage.setItem('swang-theme', 'light'); } catch(e) {}
    } else {
      html.setAttribute('data-theme', 'dark');
      try { localStorage.setItem('swang-theme', 'dark'); } catch(e) {}
    }
    window.swangSyncThemeLabels();
  };
  window.swangSyncThemeLabels();

  // Apr 27 — mobile nav toggle (gallery parity).
  window.swangToggleNav = function(btn) {
    var open = document.body.classList.toggle('nav-open');
    if (btn) btn.setAttribute('aria-expanded', open ? 'true' : 'false');
  };
  // Close drawer when a nav link is tapped.
  document.querySelectorAll('#nav-list a').forEach(function(a) {
    a.addEventListener('click', function() {
      if (document.body.classList.contains('nav-open')) {
        document.body.classList.remove('nav-open');
        var burger = document.querySelector('.nav-burger');
        if (burger) burger.setAttribute('aria-expanded', 'false');
      }
    });
  });
</script>
</body>
