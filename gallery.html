<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gallery — Mason Swanger</title>
<meta name="description" content="Gallery — Mason Swanger. Photo, video and graphic design work from swang.studio." />

<!-- Favicons / S monogram -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="alternate icon" href="/favicon.svg" />
<link rel="apple-touch-icon" href="/favicon.svg" />

<!-- Open Graph / Twitter share card -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="swang.studio" />
<meta property="og:url" content="https://www.swang.studio/gallery" />

<meta property="og:description" content="Photo, video and graphic design work from swang.studio." />
<meta property="og:image" content="https://www.swang.studio/og-image.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#ffffff; --ink:#000000; --mute:#6e6e6e; --rule:rgba(0,0,0,0.10); }
  html, body { height: 100%; }
  body {
    font-family: 'Hanken Grotesk', -apple-system, system-ui, sans-serif;
    font-size: 14px; line-height: 1.5; color: var(--ink);
    background: radial-gradient(ellipse at 30% 20%,#faf6ee 0%,#fff 55%,#f7f5ef 100%);
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column; min-height: 100vh; overflow: hidden;
  }
  ::selection { background: var(--ink); color: var(--bg); }
  a { color: inherit; text-decoration: none; }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }

  /* HEADER — shared shell */
  header {
    flex: 0 0 auto; z-index: 50;
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; padding: 18px 28px;
    border-bottom: 1px solid var(--rule);
    background: var(--bg); gap: 32px;
  }
  .name {
    justify-self: start; font-weight: 700; font-size: 15px;
    letter-spacing: -0.025em; color: var(--ink);
    display: inline-flex; align-items: baseline; gap: 6px;
    border-bottom: 1px solid transparent; padding-bottom: 1px;
    transition: border-color 150ms;
  }
  .name .arrow {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-weight: 500; font-size: 13px; color: var(--mute);
    transition: transform 200ms, color 200ms;
  }
  .name:hover { border-bottom-color: var(--ink); }
  .name:hover .arrow { transform: translateX(-2px); color: var(--ink); }
  .typer-wrap {
    justify-self: center; display: inline-flex; align-items: center;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap;
  }
  #typer { color: var(--ink); font-weight: 600; }
  .cursor {
    display: inline-block; width: 7px; height: 14px; background: var(--ink);
    margin-left: 3px; transform: translateY(2px);
    animation: blink 1.05s steps(2, start) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  nav.primary { justify-self: end; display: flex; align-items: center; gap: 18px; }
  nav.primary a {
    font-size: 13px; font-weight: 500; letter-spacing: -0.005em;
    color: var(--ink); padding: 4px 0;
    border-bottom: 1px solid transparent;
    transition: border-color 150ms; white-space: nowrap;
  }
  nav.primary a:hover, nav.primary a.active { border-bottom-color: var(--ink); }
  nav.primary .pipe { color: var(--rule); font-weight: 300; user-select: none; }

  /* STAGE — trifold (Photo / Video / Graphic Design) */
  .stage { position: relative; flex: 1 1 auto; width: 100%; overflow: hidden; }
  .blob { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
  .b1 { width: 300px; height: 300px; top: -70px; right: -50px; background: radial-gradient(circle,rgba(255,130,70,.55),rgba(255,255,255,0) 70%); }
  .b2 { width: 320px; height: 320px; bottom: -90px; left: -60px; background: radial-gradient(circle,rgba(150,80,215,.5),rgba(255,255,255,0) 70%); }

  .fold { position: absolute; top: 0; bottom: 0; z-index: 1; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; transition: left .6s cubic-bezier(.7,0,.2,1), width .6s cubic-bezier(.7,0,.2,1), opacity .3s ease; }
  .fold[data-fold="photo"] { left: 0; width: 33.333%; --tint: 255,120,60; }
  .fold[data-fold="video"] { left: 33.333%; width: 33.333%; border-left: 1px solid var(--rule); --tint: 150,80,215; }
  .fold[data-fold="gd"] { left: 66.666%; width: 33.334%; border-left: 1px solid var(--rule); --tint: 225,90,120; }
  .stage.is-open .fold:not(.open) { opacity: 0; pointer-events: none; }
  .stage.is-open .fold.open { left: 0; width: 100%; z-index: 2; border-left-color: transparent; cursor: default; }

  .phead { flex: 0 0 auto; padding: 44px 18px 16px; text-align: center; display: flex; flex-direction: column; align-items: center; }
  .titlebox { position: relative; overflow: hidden; display: inline-block; padding: 14px 28px; border-radius: 8px; border: 1.5px solid rgba(var(--tint),.65); background-color: transparent; cursor: pointer; user-select: none; -webkit-user-select: none; transition: border-color .25s, transform .2s, box-shadow .25s; animation: glow 4s ease-in-out infinite; }
  .titlebox::before { content: ''; position: absolute; top: 0; left: -140%; width: 55%; height: 100%; background: linear-gradient(100deg,transparent,rgba(255,255,255,.5),transparent); transform: skewX(-18deg); animation: sheen 5s ease-in-out infinite; pointer-events: none; }
  .fold[data-fold="video"] .titlebox, .fold[data-fold="video"] .titlebox::before { animation-delay: 1.3s; }
  .fold[data-fold="gd"] .titlebox, .fold[data-fold="gd"] .titlebox::before { animation-delay: 2.6s; }
  .title { position: relative; z-index: 1; font-size: clamp(20px,3vw,36px); font-weight: 800; letter-spacing: -.02em; line-height: 1; color: var(--ink); }
  .fold:hover .titlebox { border-color: rgba(var(--tint),.95); box-shadow: 0 8px 20px rgba(0,0,0,.13); transform: translateY(-3px); }
  @keyframes glow { 0%,100% { box-shadow: 0 0 0 0 rgba(var(--tint),0); } 50% { box-shadow: 0 0 16px 0 rgba(var(--tint),.22); } }
  @keyframes sheen { 0% { left: -140%; } 40% { left: 150%; } 100% { left: 150%; } }
  .sub { font-style: italic; font-size: 13px; letter-spacing: .01em; color: var(--mute); margin-top: 12px; min-height: 16px; }
  .hint { font-family:'Geist Mono',monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--mute); margin-top:8px; }
  .stage.is-open .fold.open .hint { display:none; }

  .preview { flex: 1 1 auto; padding: 6px 16px 22px; overflow: hidden; }
  .stage.is-open .fold.open .preview { overflow-y: auto; padding: 6px 24px 30px; scrollbar-width: thin; }
  .stage.is-open .fold.open .phead { padding-top: 30px; }

  /* Empty (cleared) folds — Photo + Graphic Design */
  .empty-note { display: flex; height: 100%; min-height: 90px; align-items: center; justify-content: center;
    font-family:'Geist Mono',monospace; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: rgba(0,0,0,.28); }

  /* tile fade-in */
  @keyframes tin { to { opacity: 1; transform: translateY(0); } }

  /* VIDEO / REELS — mixed collection, no labels.
     Closed teaser = 2-col grid of local posters.
     Open = masonry columns so Instagram embeds keep their own natural height
     (no 9:16 crop) and local 9:16 clips pack alongside with no voids. */
  .reels { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
  /* Featured row — 3 big reels. Full-width (no centered cap) so it lines up
     edge-to-edge with the masonry below — no empty "liminal" gutters. */
  .reels-featured { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px;
    max-width: none; margin: 0 0 12px; }
  /* Featured row: keep default 9:16 aspect for local mp4s (.reel inherits aspect-ratio:9/16) */
  .stage.is-open .fold.open .reels-featured .reel.ig .ig-clip { height: 470px; }
  .stage.is-open .fold.open .reels-featured .reel.ig iframe { height: 1100px; }
  /* Open state: one clean, uniform 4-across grid (no featured row, no masonry).
     All reels are 9:16 so rows line up perfectly; a partial last row left-aligns. */
  .stage.is-open .fold.open .reels { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .stage.is-open .fold.open .reels .reel.ig .ig-clip { height: 430px; }
  .stage.is-open .fold.open .reels .reel.ig iframe { height: 1000px; }
  .reel { position: relative; aspect-ratio: 9/16; border-radius: 11px; overflow: hidden; background: #000;
    border: 1px solid rgba(0,0,0,.08); box-shadow: 0 2px 6px rgba(0,0,0,.07); cursor: pointer;
    transition: transform .3s cubic-bezier(.2,.7,.2,1), box-shadow .3s ease;
    opacity: 0; transform: translateY(10px); animation: tin .5s forwards; }
  .stage.is-open .fold.open .reel { width: 100%; margin: 0; }
  .reel:hover { transform: translateY(-5px); box-shadow: 0 14px 30px rgba(0,0,0,.16); }
  .reel video { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; object-fit: cover; background:#000; display:block; }
  /* Instagram cards: clip the embed at the end of the video so the action bar
     (heart/comment/share + likes count + Add a comment) is hidden, then append
     our own "View more on Instagram" link beneath the clip. */
  .reel.ig { aspect-ratio: auto; background: #fff; border-color: rgba(0,0,0,.12);
    display: flex; flex-direction: column; }
  .reel.ig .ig-clip { width: 100%; overflow: hidden; height: 500px; }
  .reel.ig iframe { width: 100%; height: 1100px; border: 0; display: block; background: #fff; }
  .reel.ig .ig-more { display: block; padding: 11px 14px; font-size: 13px; font-weight: 600;
    color: #00376b; background: #fff; border-top: 1px solid rgba(0,0,0,.08);
    text-align: left; text-decoration: none; letter-spacing: 0; }
  .reel.ig .ig-more:hover { background: #fafafa; text-decoration: underline; }
  .stage.is-open .fold.open .reel.ig .ig-clip { height: 560px; }
  .stage.is-open .fold.open .reel.ig iframe { height: 1100px; }
  .reel.local::after { content:'\25B6'; position:absolute; inset:0; margin:auto; width:46px; height:46px; display:flex; align-items:center; justify-content:center; font-size:15px; color:#fff; background:rgba(0,0,0,.4); border:1.5px solid rgba(255,255,255,.85); border-radius:50%; z-index:2; pointer-events:none; transition:opacity .25s, transform .25s; }
  .reel.local:hover::after { transform: scale(1.08); background: rgba(0,0,0,.55); }
  .reel.local.playing::after { opacity: 0; }

  /* GRAPHIC DESIGN — one mixed masonry grid (vertical promos + horizontal thumbs) */
  .gdm { column-count: 2; column-gap: 8px; }
  .stage.is-open .fold.open .gdm { column-count: 3; column-gap: 12px; }
  .gdm .gi { break-inside: avoid; margin: 0 0 8px; border-radius: 8px; overflow: hidden;
    border: 1px solid rgba(0,0,0,.07); background: rgba(0,0,0,.04); display: block;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
    opacity: 0; transform: translateY(10px); animation: tin .5s forwards; }
  .stage.is-open .fold.open .gdm .gi { margin-bottom: 12px; }
  .gdm .gi img { width: 100%; height: auto; display: block; transition: transform .5s cubic-bezier(.2,.7,.2,1); }
  .gdm .gi:hover img { transform: scale(1.04); }
  /* Paired pieces (e.g. mailer front + back) render side-by-side as a single item */
  .gdm .gi-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
    overflow: hidden; border: 1px solid rgba(0,0,0,.07); background: rgba(0,0,0,.04); }
  .gdm .gi-pair img { border-radius: 0; }

  .close { position: absolute; top: 18px; right: 22px; z-index: 5; width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(0,0,0,.18); background-color: rgba(255,255,255,.8); display: none; align-items: center; justify-content: center; font-size: 17px; color: #333; cursor: pointer; }
  .stage.is-open .close { display: flex; }

  /* FOOTER */
  footer {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px; border-top: 1px solid var(--rule);
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--ink); gap: 16px; flex-wrap: wrap;
    background: var(--bg);
  }
  footer a { border-bottom: 1px solid transparent; transition: border-color 150ms; }
  footer a:hover { border-bottom-color: var(--ink); }

  @media (max-width: 980px) {
    header {
      grid-template-columns: auto 1fr;
      grid-template-rows: auto auto;
      gap: 4px 14px;
      padding: 14px 22px 12px;
    }
    .name { grid-column: 1; grid-row: 1; }
    nav.primary { grid-column: 2; grid-row: 1; justify-self: end; gap: 12px; }
    nav.primary a { font-size: 12px; }
    .typer-wrap {
      grid-column: 1 / -1; grid-row: 2;
      justify-self: center; font-size: 12px;
    }
    .stage.is-open .fold.open .reels { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .stage.is-open .fold.open .gdm { column-count: 2; }
  }
  @media (max-width: 560px) {
    header { padding: 14px 18px; }
    nav.primary .pipe { display: none; }
    nav.primary a { font-size: 11px; }
    footer { padding: 12px 18px; font-size: 10px; }
    .title { font-size: clamp(16px,5vw,24px); }
    .titlebox { padding: 11px 16px; }
    .stage.is-open .fold.open .gdm { column-count: 2; }
  }
  @media (prefers-reduced-motion: reduce) {
    .titlebox, .titlebox::before { animation: none !important; }
    .reel { animation: none !important; opacity: 1; transform: none; }
  }

  /* ============================================================
     MOBILE TRIFOLD ACCORDION (<=720px)
     On phones we flatten the desktop horizontal trifold into a
     vertical accordion: three condensed tappable titlebox buttons
     (Photo / Video / Graphic Design) stacked top-down. Tapping
     one expands that section's full content inline below it;
     others stay collapsed as buttons. Body scrolls naturally.
     Desktop trifold (>=721px) is unchanged.
     ============================================================ */
  @media (max-width: 720px) {
    html, body {
      height: auto !important;
      min-height: 100%;
      overflow: auto !important;
      overflow-x: hidden !important;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
    }
    body { display: block; min-height: 100vh; }
    .stage {
      position: static !important;
      height: auto !important;
      min-height: auto !important;
      overflow: visible !important;
      display: block;
    }
    /* Each fold becomes a full-width stacked card */
    .fold,
    .fold[data-fold="photo"],
    .fold[data-fold="video"],
    .fold[data-fold="gd"],
    .stage.is-open .fold:not(.open),
    .stage.is-open .fold.open {
      position: relative !important;
      left: auto !important;
      top: auto !important;
      right: auto !important;
      bottom: auto !important;
      width: 100% !important;
      height: auto !important;
      min-height: auto !important;
      border-left: 0 !important;
      border-top: 1px solid var(--rule);
      opacity: 1 !important;
      pointer-events: auto !important;
      cursor: pointer !important;
      display: block !important;
      z-index: auto !important;
      overflow: visible !important;
    }
    .fold[data-fold="photo"] { border-top: 0 !important; }
    /* Condensed titlebox button */
    .phead { padding: 20px 16px 14px !important; }
    .titlebox { padding: 11px 22px !important; }
    .title { font-size: 22px !important; }
    .sub { font-size: 11px !important; margin-top: 6px !important; }
    .hint {
      display: block !important;
      font-size: 10px;
      margin-top: 6px !important;
      color: var(--mute);
    }
    /* Closed folds: show preview as a HORIZONTAL CAROUSEL teaser */
    .preview,
    .stage.is-open .fold:not(.open) .preview {
      display: block !important;
      padding: 6px 14px 12px !important;
      overflow-x: auto !important;
      overflow-y: hidden !important;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
      scroll-snap-type: x mandatory;
      max-height: none !important;
    }
    /* The carousel content: force horizontal flex row, no column masonry */
    .preview > .gdm,
    .stage.is-open .fold:not(.open) .preview > .gdm {
      column-count: unset !important;
      column-gap: 0 !important;
      display: flex !important;
      gap: 8px !important;
      padding-bottom: 6px;
    }
    .preview > .gdm > .gi,
    .stage.is-open .fold:not(.open) .preview > .gdm > .gi {
      flex: 0 0 auto !important;
      width: 140px !important;
      margin-bottom: 0 !important;
      scroll-snap-align: start;
    }
    .preview > .gdm > .gi img { aspect-ratio: 3/4; object-fit: cover; height: auto !important; }
    /* Carousel reels: same horizontal strip pattern */
    .preview > .reels,
    .stage.is-open .fold:not(.open) .preview > .reels {
      display: flex !important;
      gap: 8px !important;
      column-count: unset !important;
      padding-bottom: 6px;
    }
    .preview > .reels > .reel,
    .stage.is-open .fold:not(.open) .preview > .reels > .reel {
      flex: 0 0 auto !important;
      width: 130px !important;
      height: 230px !important;
      margin-bottom: 0 !important;
      scroll-snap-align: start;
    }
    .preview > .reels > .reel.ig { display: none !important; } /* IG embeds too heavy for carousel — skip */

    /* Open fold: show preview, full content, scrolls naturally with page */
    .stage.is-open .fold.open .preview {
      display: block !important;
      overflow: visible !important;
      padding: 6px 14px 24px !important;
      touch-action: pan-y;
      max-height: none !important;
      height: auto !important;
    }
    /* Open fold's masonry returns to vertical 2-col */
    .stage.is-open .fold.open .preview > .gdm {
      column-count: 2 !important;
      column-gap: 8px !important;
      display: block !important;
      padding-bottom: 0;
    }
    .stage.is-open .fold.open .preview > .gdm > .gi {
      flex: initial !important;
      width: auto !important;
      margin-bottom: 8px !important;
    }
    .stage.is-open .fold.open .preview > .gdm > .gi img { aspect-ratio: auto; height: auto !important; }
    /* Open fold: accent the titlebox so it visually pops */
    .stage.is-open .fold.open .titlebox {
      border-color: rgba(var(--tint), .95) !important;
      box-shadow: 0 6px 18px rgba(0,0,0,.12);
    }
    /* Hint disappears on the open fold (its content is right there) */
    .stage.is-open .fold.open .hint { display: none !important; }
    /* Subtle background tint on open fold for visual focus */
    .stage.is-open .fold.open { background: rgba(var(--tint), .03); }
    /* Photos and graphic design: 2 columns */
    .gdm,
    .stage.is-open .fold.open .gdm {
      column-count: 2 !important;
      column-gap: 8px !important;
    }
    .gdm .gi { margin-bottom: 8px !important; }
    /* Hide the floating close X — accordion has its own dismiss (re-tap) */
    .close, .stage.is-open .close { display: none !important; }
    /* OPEN-state Video fold on mobile: keep the 3-up featured row + 2-col masonry rest,
       matching desktop structure just scaled to phone width. */
    .stage.is-open .fold.open .reels-featured {
      display: grid !important;
      grid-template-columns: repeat(3, 1fr) !important;
      gap: 8px !important;
      max-width: 100% !important;
      margin: 0 auto 18px !important;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(0,0,0,.08);
    }
    .stage.is-open .fold.open .reels {
      display: grid !important;
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 8px !important;
    }
    /* Local mp4 reels — 9:16 portrait, fill their grid/column cell */
    .stage.is-open .fold.open .reel,
    .stage.is-open .fold.open .reels .reel.local {
      height: auto !important;
      aspect-ratio: 9 / 16;
      width: 100% !important;
      max-width: 100% !important;
      margin: 0 !important;
    }
    .stage.is-open .fold.open .reel video { width: 100% !important; height: 100% !important; object-fit: cover; }
    /* IG embed reels — iframe and container heights MUST match so nothing crops.
       720px is enough for the IG header (~50px) + 9:16 reel video + bottom bar (~50px) on a ~360px-wide phone. */
    .stage.is-open .fold.open .reel.ig,
    .stage.is-open .fold.open .reels-featured .reel.ig,
    .stage.is-open .fold.open .reels .reel.ig {
      height: auto !important;
      aspect-ratio: auto !important;
      width: 100% !important;
      max-width: 380px;
      margin: 0 auto 12px !important;
    }
    .stage.is-open .fold.open .reel.ig .ig-clip,
    .stage.is-open .fold.open .reels-featured .reel.ig .ig-clip,
    .stage.is-open .fold.open .reels .reel.ig .ig-clip {
      height: 555px !important;
    }
    .stage.is-open .fold.open .reel.ig iframe,
    .stage.is-open .fold.open .reels-featured .reel.ig iframe,
    .stage.is-open .fold.open .reels .reel.ig iframe {
      height: 1100px !important;
      width: 100% !important;
    }
    /* Hide decorative background blobs (visual noise on phones) */
    .blob { display: none !important; }
  }
</style>
</head>

  <nav class="primary">

    <span class="pipe">|</span>
    <a href="./clients.html">Clients</a>
  </nav>
</header>

<main class="stage" id="stage" aria-label="Gallery">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="close mono" id="close" role="button" tabindex="0" aria-label="Fold back">&times;</div>

  <div class="fold" data-fold="photo">
    <div class="phead">
      <div class="titlebox" role="button" tabindex="0" aria-label="Photo"><span class="title">Photo</span></div>
      <div class="sub">Showcasing Projects</div>
      <div class="hint">Tap to view</div>
    </div>
    <div class="preview" data-grid="photo"></div>
  </div>

  <div class="fold" data-fold="video">
    <div class="phead">
      <div class="titlebox" role="button" tabindex="0" aria-label="Open Video"><span class="title">Video</span></div>
      <div class="sub">Influencer &amp; Company Reels</div>
      <div class="hint">Tap to view</div>
    </div>
    <div class="preview" data-grid="video"></div>
  </div>

  <div class="fold" data-fold="gd">
    <div class="phead">
      <div class="titlebox" role="button" tabindex="0" aria-label="Graphic Design"><span class="title">Graphic Design</span></div>
      <div class="sub">Thumbnails, Brand &amp; Print</div>
      <div class="hint">Tap to view</div>
    </div>
    <div class="preview" data-grid="gd"></div>
  </div>
</main>

<footer>
  <span><a href="mailto:hello@swang.studio">hello@swang.studio</a></span>
  <span>Los Angeles, CA</span>
</footer>

<script>
  /* Header tagline typer */
  (function () {
    const el = document.getElementById('typer');
    const phrases = ['Meta Creatives','Brand Visibility','Content Creation','Graphic Design','Advertising Strategy'];
    const typeSpeed=150, deleteSpeed=75, holdEnd=5000, holdStart=1200;
    let p=1, c=0, del=false;
    function tick(){
      const ph=phrases[p]; c+=del?-1:1;
      el.textContent=ph.substring(0,c);
      if(!del&&c===ph.length){del=true;setTimeout(tick,holdEnd);return;}
      if(del&&c<=0){c=0;del=false;p=(p+1)%phrases.length;setTimeout(tick,holdStart);return;}
      setTimeout(tick,del?deleteSpeed:typeSpeed);
    }
    el.textContent=''; setTimeout(tick,600);
  })();

  /* Video fold — one mixed collection. Instagram reels interleaved with local
     mp4s. No labels, no sorting. Photo + Graphic Design folds are intentionally
     cleared (awaiting curated uploads). */
  const REELS = [
    {t:'local', v:'reels/reel-golf-transformation.mp4', p:'reels/posters/reel-golf-transformation.jpg'},
    {t:'local', v:'reels/ig/ig-shaadiefit.mp4',         p:'reels/ig/posters/ig-shaadiefit.jpg'},
    {t:'local', v:'reels/bull-boulder/bb-reel-1.mp4',   p:'reels/bull-boulder/bb-reel-1-poster.jpg'},
    {t:'local', v:'reels/reel-putting-green.mp4',       p:'reels/posters/reel-putting-green.jpg'},
    {t:'local', v:'reels/ig/ig-sandra-zaniewska.mp4',   p:'reels/ig/posters/ig-sandra-zaniewska.jpg'},
    {t:'local', v:'reels/reel-sage-rutty-generational-wealth.mp4', p:'reels/posters/reel-sage-rutty-generational-wealth.jpg'},
    {t:'local', v:'reels/bull-boulder/bb-reel-2.mp4',   p:'reels/bull-boulder/bb-reel-2-poster.jpg'},
    {t:'local', v:'reels/reel-dirt-to-turf.mp4',        p:'reels/posters/reel-dirt-to-turf.jpg'},
    {t:'local', v:'reels/ig/ig-kristof-vliegen.mp4',    p:'reels/ig/posters/ig-kristof-vliegen.jpg'},
    {t:'local', v:'reels/bull-boulder/bb-reel-3.mp4',   p:'reels/bull-boulder/bb-reel-3-poster.jpg'},
    {t:'local', v:'reels/reel-paver-build.mp4',         p:'reels/posters/reel-paver-build.jpg'},
    {t:'local', v:'reels/ig/ig-sketch.mp4',             p:'reels/ig/posters/ig-sketch.jpg'},
    {t:'local', v:'reels/reel-sage-rutty-gold-captions.mp4',       p:'reels/posters/reel-sage-rutty-gold-captions.jpg'},
    {t:'local', v:'reels/bull-boulder/bb-reel-4.mp4',   p:'reels/bull-boulder/bb-reel-4-poster.jpg'},
    {t:'local', v:'reels/reel-turf-bbq-pavers.mp4',     p:'reels/posters/reel-turf-bbq-pavers.jpg'},
    {t:'local', v:'reels/ig/ig-im8.mp4',                p:'reels/ig/posters/ig-im8.jpg'},
    {t:'local', v:'reels/bull-boulder/bb-reel-5.mp4',   p:'reels/bull-boulder/bb-reel-5-poster.jpg'},
    {t:'local', v:'reels/reel-golf.mp4',                p:'reels/posters/reel-golf.jpg'},
  ];

  /* Front row — pushed to the front of the open grid (Mason's pick) */
  const FEATURED = [
    {t:'local', v:'reels/reel-bethel-island.mp4',       p:'reels/posters/reel-bethel-island.jpg'},              // NEW: Bethel Island
    {t:'local', v:'reels/reel-golf.mp4',                p:'reels/posters/reel-golf.jpg'},                       // putting green (aerial, finished)
    {t:'local', v:'reels/ig/ig-sandra-zaniewska.mp4',   p:'reels/ig/posters/ig-sandra-zaniewska.jpg'},          // Sandra Zaniewska
    {t:'local', v:'reels/ig/ig-kristof-vliegen.mp4',    p:'reels/ig/posters/ig-kristof-vliegen.jpg'},           // Kristof Vliegen
    {t:'local', v:'reels/ig/ig-im8.mp4',                p:'reels/ig/posters/ig-im8.jpg'},                       // IM8 "JUST" fitness
  ];
  const FEATKEYS = ['reels/reel-bethel-island.mp4','reels/reel-golf.mp4','reels/ig/ig-sandra-zaniewska.mp4','reels/ig/ig-kristof-vliegen.mp4','reels/ig/ig-im8.mp4'];
  const REST = REELS.filter(function(r){ return FEATKEYS.indexOf(r.v)===-1; });

  /* Photos — mixed grid, verticals + horizontals interleaved (greens, grass, builds) */
  const PHOTOS = ['img/gallery/photo-01.jpg', 'img/gallery/photo-02.jpg', 'img/gallery/photo-08.jpg', 'img/gallery/photo-03.jpg', 'img/gallery/photo-04.jpg', 'img/gallery/photo-14.jpg', 'img/gallery/photo-05.jpg', 'img/gallery/photo-06.jpg', 'img/gallery/photo-15.jpg', 'img/gallery/photo-07.jpg', 'img/gallery/photo-09.jpg', 'img/gallery/photo-16.jpg', 'img/gallery/photo-10.jpg', 'img/gallery/photo-11.jpg', 'img/gallery/photo-18.jpg', 'img/gallery/photo-12.jpg', 'img/gallery/photo-19.jpg', 'img/gallery/photo-17.jpg', 'img/gallery/photo-22.jpg', 'img/gallery/photo-20.jpg', 'img/gallery/photo-26.jpg', 'img/gallery/photo-27.jpg', 'img/gallery/photo-21.jpg', 'img/gallery/photo-28.jpg', 'img/gallery/photo-30.jpg', 'img/gallery/photo-23.jpg', 'img/gallery/photo-31.jpg', 'img/gallery/photo-32.jpg', 'img/gallery/photo-24.jpg', 'img/gallery/photo-33.jpg', 'img/gallery/photo-34.jpg', 'img/gallery/photo-25.jpg', 'img/gallery/photo-35.jpg', 'img/gallery/photo-36.jpg', 'img/gallery/photo-29.jpg', 'img/gallery/photo-37.jpg', 'img/gallery/photo-38.jpg', 'img/gallery/photo-42.jpg', 'img/gallery/photo-39.jpg', 'img/gallery/photo-40.jpg', 'img/gallery/photo-41.jpg', 'img/gallery/photo-43.jpg', 'img/gallery/photo-44.jpg', 'img/gallery/photo-45.jpg', 'img/gallery/photo-46.jpg', 'img/gallery/photo-47.jpg'];

  /* Graphic Design — one mixed grid. Pairs (front+back of a single piece) render
     side-by-side via .gi-pair so the two halves stay linked visually. */
  const GD = [
    'gd/pto-prices.jpg',
    { pair: ['gd/sage-rutty-mailer-1.jpg', 'gd/sage-rutty-mailer-2.jpg'], alt: 'Sage Rutty B2B mailer (front + back)' },
    { pair: ['gd/bng-customer.jpg', 'gd/bng-transformation.jpg'], alt: 'Back Nine Greens customer mailer (front + back)' },
    'gd/thumb-1.jpg',
    'gd/pto-resolutions.jpg', 'gd/thumb-2.jpg',
    'gd/pto-testimonial.jpg', 'gd/thumb-3.jpg', 'gd/ncga-bring-green-home.jpg',
    'gd/thumb-4.jpg', 'gd/thumb-5.jpg', 'gd/thumb-6.jpg', 'gd/thumb-7.jpg',
  ];

  function reelCard(r, i){
    const card = document.createElement('div');
    card.style.animationDelay = (i*45) + 'ms';
    if (r.t === 'local') {
      card.className = 'reel local';
      card.innerHTML = '<video preload="none" playsinline loop poster="'+r.p+'"><source src="'+r.v+'" type="video/mp4"></video>';
      const vid = card.querySelector('video');
      card.addEventListener('click', function(){
        if (vid.paused) {
          // pause any other reel that's playing, so audio never overlaps
          document.querySelectorAll('.reel.local.playing video').forEach(function(o){ if(o!==vid){ o.pause(); o.closest('.reel').classList.remove('playing'); } });
          vid.play(); card.classList.add('playing');
        } else { vid.pause(); card.classList.remove('playing'); }
      });
    } else {
      card.className = 'reel ig';
      var path = (r.k === 'p') ? 'p' : 'reel';
      var url = 'https://www.instagram.com/'+path+'/'+r.id+'/';
      card.innerHTML =
        '<div class="ig-clip"><iframe src="'+url+'embed/" loading="lazy" scrolling="no" allowtransparency="true" allowfullscreen="true" title="Instagram"></iframe></div>' +
        '<a class="ig-more" href="'+url+'" target="_blank" rel="noopener">View more on Instagram</a>';
    }
    return card;
  }

  function renderVideo(grid, open){
    grid.innerHTML='';
    if(open){
      // one clean, uniform 4-across grid — all reels, same size, no featured row
      const all = FEATURED.concat(REST);
      const wrap=document.createElement('div'); wrap.className='reels';
      all.forEach(function(r,i){ wrap.appendChild(reelCard(r,i)); });
      grid.appendChild(wrap);
    } else {
      // teaser shows local posters only (IG embeds need width — they appear when opened)
      const wrap=document.createElement('div'); wrap.className='reels';
      REELS.filter(function(r){return r.t==='local';}).slice(0,6).forEach(function(r,i){ wrap.appendChild(reelCard(r,i)); });
      grid.appendChild(wrap);
    }
  }
  function renderMasonry(grid, list, alt){
    const m = document.createElement('div'); m.className='gdm';
    list.forEach(function(item,i){
      const gi = document.createElement('div');
      gi.style.animationDelay = (Math.min(i,16)*40) + 'ms';
      if (item && typeof item === 'object' && item.pair) {
        gi.className = 'gi gi-pair';
        var pairAlt = item.alt || alt;
        gi.innerHTML = item.pair.map(function(src){
          return '<img loading="lazy" src="'+src+'" alt="'+pairAlt+'">';
        }).join('');
      } else {
        gi.className = 'gi';
        gi.innerHTML = '<img loading="lazy" src="'+item+'" alt="'+alt+'">';
      }
      m.appendChild(gi);
    });
    grid.innerHTML=''; grid.appendChild(m);
  }
  function renderGD(grid, open){ renderMasonry(grid, open ? GD : GD.slice(0,10), 'Graphic design'); }
  function renderPhotos(grid, open){ renderMasonry(grid, open ? PHOTOS : PHOTOS.slice(0,14), 'Project photo'); }
  function renderEmpty(grid){
    grid.innerHTML = '<div class="empty-note">Coming soon</div>';
  }

  /* ===================== TRI-FOLD OPEN / CLOSE =====================
     Desktop: horizontal trifold, tap a fold to expand it full-width.
     Mobile (<=720px): vertical accordion — 3 condensed titlebox
     buttons stacked top-down, tap one to expand its content inline
     below; tapping again (or tapping another) closes it. No fold
     is auto-opened so the initial view is just the 3 buttons.
     ================================================================ */
  (function(){
    var stage=document.getElementById('stage');
    var closeBtn=document.getElementById('close');
    var folds=Array.prototype.slice.call(stage.querySelectorAll('.fold'));
    var IS_MOBILE = window.matchMedia('(max-width: 720px)').matches;

    function renderMobileCarousel(grid, kind){
      // Horizontal-scroll mini carousel for the closed-state teaser on phones.
      // CSS handles the flex/scroll behavior — we just emit the same DOM
      // structure the open state uses (.gdm > .gi or .reels > .reel),
      // limited to ~6 items for performance.
      grid.innerHTML='';
      if(kind==='photo'){
        var m=document.createElement('div'); m.className='gdm';
        PHOTOS.slice(0,8).forEach(function(src,i){
          var gi=document.createElement('div'); gi.className='gi';
          gi.innerHTML='<img loading="lazy" src="'+src+'" alt="Project photo">';
          m.appendChild(gi);
        });
        grid.appendChild(m);
      } else if(kind==='gd'){
        var m=document.createElement('div'); m.className='gdm';
        // Teaser shows single images only — the front/back pairs look cramped
        // at thumbnail size, so they're reserved for the expanded view.
        GD.filter(function(item){ return typeof item === 'string'; })
          .slice(0,8).forEach(function(src){
            var gi=document.createElement('div'); gi.className='gi';
            gi.innerHTML='<img loading="lazy" src="'+src+'" alt="Graphic design">';
            m.appendChild(gi);
          });
        grid.appendChild(m);
      } else if(kind==='video'){
        // Carousel uses local-only posters (IG embeds hidden via CSS for performance)
        var wrap=document.createElement('div'); wrap.className='reels';
        REELS.filter(function(r){return r.t==='local';}).slice(0,6).forEach(function(r,i){
          wrap.appendChild(reelCard(r,i));
        });
        grid.appendChild(wrap);
      }
    }
    function renderFold(f, open){
      var grid=f.querySelector('.preview');
      var kind=f.getAttribute('data-fold');
      var isOpen=f.classList.contains('open');
      // Closed fold:
      // - Mobile: render a horizontal-scroll mini-carousel teaser
      // - Desktop with another fold open: empty grid (covered by opacity:0)
      if(open && !isOpen){
        if(IS_MOBILE) renderMobileCarousel(grid, kind);
        else grid.innerHTML='';
        return;
      }
      // Initial load on mobile, no fold is open yet — still show carousels
      if(!open && IS_MOBILE){
        renderMobileCarousel(grid, kind);
        return;
      }
      // Otherwise: standard render (open=true && isOpen=true = full, !open = closed teaser)
      var showFull = open && isOpen;
      if(kind==='video') renderVideo(grid, showFull);
      else if(kind==='gd') renderGD(grid, showFull);
      else if(kind==='photo') renderPhotos(grid, showFull);
      else renderEmpty(grid);
    }
    function fillAll(open){ folds.forEach(function(f){ renderFold(f, open); }); }
    function openFold(f){
      folds.forEach(function(x){ x.classList.toggle('open',x===f); });
      stage.classList.add('is-open');
      fillAll(true);
      // On mobile, after expanding, scroll the opened titlebox into view
      if(IS_MOBILE){
        setTimeout(function(){
          var rect = f.querySelector('.titlebox').getBoundingClientRect();
          if(rect.top < 0 || rect.top > window.innerHeight*0.4){
            f.querySelector('.titlebox').scrollIntoView({behavior:'smooth', block:'start'});
          }
        }, 80);
      }
    }
    function reset(){
      stage.querySelectorAll('video').forEach(function(v){ try{v.pause();}catch(e){} });
      folds.forEach(function(x){ x.classList.remove('open'); });
      stage.classList.remove('is-open');
      fillAll(false);
    }
    function toggle(f){ if(f.classList.contains('open')) reset(); else openFold(f); }
    folds.forEach(function(f){
      f.querySelector('.titlebox').addEventListener('click',function(e){ e.stopPropagation(); toggle(f); });
      f.addEventListener('click',function(){ if(!stage.classList.contains('is-open')) openFold(f); });
    });
    closeBtn.addEventListener('click',function(e){ e.stopPropagation(); reset(); });
    document.addEventListener('keydown',function(e){ if(e.key==='Escape' && stage.classList.contains('is-open')) reset(); });
    fillAll(false);
  })();
</script>

</body>
