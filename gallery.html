<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gallery — Mason Swanger</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#ffffff; --ink:#000000; --mute:#6e6e6e; --rule:rgba(0,0,0,0.10); }
  html, body { min-height: 100%; }
  body {
    font-family: 'Hanken Grotesk', -apple-system, system-ui, sans-serif;
    font-size: 14px; line-height: 1.5; color: var(--ink); background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--ink); color: var(--bg); }
  a { color: inherit; text-decoration: none; }

  /* HEADER — shared shell */
  header {
    position: sticky; top: 0; z-index: 50;
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; padding: 18px 28px;
    border-bottom: 1px solid var(--rule);
    background: var(--bg); gap: 32px;
  }
  .name {
    justify-self: start; font-weight: 700; font-size: 15px;
    letter-spacing: -0.025em; color: var(--ink);
    display: inline-flex; align-items: baseline; gap: 6px;
    border-bottom: 1px solid transparent; padding-bottom: 1px;
    transition: border-color 150ms;
  }
  .name .arrow {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-weight: 500; font-size: 13px; color: var(--mute);
    transition: transform 200ms, color 200ms;
  }
  .name:hover { border-bottom-color: var(--ink); }
  .name:hover .arrow { transform: translateX(-2px); color: var(--ink); }
  .typer-wrap {
    justify-self: center; display: inline-flex; align-items: center;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap;
  }
  #typer { color: var(--ink); font-weight: 600; }
  .cursor {
    display: inline-block; width: 7px; height: 14px; background: var(--ink);
    margin-left: 3px; transform: translateY(2px);
    animation: blink 1.05s steps(2, start) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  nav.primary {
    justify-self: end; display: flex; align-items: center; gap: 18px;
  }
  nav.primary a {
    font-size: 13px; font-weight: 500; letter-spacing: -0.005em;
    color: var(--ink); padding: 4px 0;
    border-bottom: 1px solid transparent;
    transition: border-color 150ms; white-space: nowrap;
  }
  nav.primary a:hover, nav.primary a.active { border-bottom-color: var(--ink); }
  nav.primary .pipe { color: var(--rule); font-weight: 300; user-select: none; }

  /* Blank stage — Mason will curate photos */
  .empty-stage { min-height: calc(100vh - 120px); }

  /* PAGE HEAD (unused now — kept for future restoration) */
  .page-head {
    padding: 64px 28px 28px;
    border-bottom: 1px solid var(--rule);
  }
  .page-head-inner { max-width: 1320px; margin: 0 auto; }
  .eyebrow {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--mute);
    margin-bottom: 22px;
  }
  .page-title {
    font-weight: 800;
    font-size: clamp(48px, 7vw, 96px);
    line-height: 0.98; letter-spacing: -0.04em;
    color: var(--ink);
  }
  .page-sub {
    margin-top: 18px; font-size: 15px; line-height: 1.6;
    color: var(--mute); max-width: 60ch;
  }

  /* GRID — bento with varied tile sizes */
  .grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 2px;
    padding: 2px;
    background: var(--ink);     /* hairline grid via gap */
  }
  .tile {
    position: relative; overflow: hidden;
    background: var(--bg);
    aspect-ratio: 4 / 3;
  }
  .tile img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 800ms cubic-bezier(.2,.0,.2,1), filter 240ms;
  }
  .tile:hover img { transform: scale(1.04); }
  .tile-cap {
    position: absolute; left: 14px; bottom: 12px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10.5px; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--bg);
    background: var(--ink); padding: 4px 8px;
    opacity: 0; transform: translateY(4px);
    transition: opacity 240ms, transform 240ms;
    pointer-events: none;
  }
  .tile:hover .tile-cap { opacity: 1; transform: translateY(0); }

  /* Tile spans */
  .t-wide   { grid-column: span 8; aspect-ratio: 16 / 9; }
  .t-half   { grid-column: span 6; aspect-ratio: 3 / 2; }
  .t-third  { grid-column: span 4; }
  .t-tall   { grid-column: span 4; aspect-ratio: 3 / 4; }
  .t-eight  { grid-column: span 8; aspect-ratio: 16 / 9; }

  /* FOOTER */
  footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px; border-top: 1px solid var(--rule);
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--ink); gap: 16px; flex-wrap: wrap;
  }
  footer a { border-bottom: 1px solid transparent; transition: border-color 150ms; }
  footer a:hover { border-bottom-color: var(--ink); }
  footer .sep { color: var(--mute); margin: 0 8px; }

  @media (max-width: 980px) {
    header { grid-template-columns: auto 1fr; gap: 14px; }
    .typer-wrap { display: none; }
    nav.primary { justify-self: end; gap: 12px; }
    nav.primary a { font-size: 12px; }
  }
  @media (max-width: 760px) {
    .page-head { padding: 36px 20px 22px; }
    .grid { grid-template-columns: repeat(2, 1fr); }
    .t-wide, .t-half, .t-third, .t-tall, .t-eight {
      grid-column: span 2; aspect-ratio: 4 / 3;
    }
  }
  @media (max-width: 520px) {
    header { padding: 14px 18px; }
    nav.primary .pipe { display: none; }
    nav.primary a { font-size: 11px; }
    footer { padding: 12px 18px; font-size: 10px; flex-direction: column; align-items: flex-start; gap: 4px; }
  }
</style>
</head>
<body>

<header>
  <a href="./index.html" class="name"><span class="arrow">←</span> Mason Swanger</a>
  <div class="typer-wrap" aria-hidden="true">
    <span id="typer">Meta Creatives</span>
    <span class="cursor"></span>
  </div>
  <nav class="primary">
    <a href="./gallery.html" class="active">Gallery</a>
    <span class="pipe">|</span>
    <a href="./case-studies.html">Case Studies</a>
    <span class="pipe">|</span>
    <a href="./clients.html">Clients</a>
  </nav>
</header>

<main class="empty-stage" aria-label="Gallery (curated photos pending)"></main>

<footer>
  <span><a href="mailto:hello@swang.studio">hello@swang.studio</a></span>
  <span>Los Angeles, CA</span>
</footer>

<script>
  (function () {
    const el = document.getElementById('typer');
    const phrases = ['Meta Creatives','Brand Visibility','Content Creation','Graphic Design','Advertising Strategy'];
    const typeSpeed=150, deleteSpeed=75, holdEnd=5000, holdStart=1200;
    let p=1, c=0, del=false;   // gallery starts on Brand Visibility
    function tick(){
      const ph=phrases[p]; c+=del?-1:1;
      el.textContent=ph.substring(0,c);
      if(!del&&c===ph.length){del=true;setTimeout(tick,holdEnd);return;}
      if(del&&c<=0){c=0;del=false;p=(p+1)%phrases.length;setTimeout(tick,holdStart);return;}
      setTimeout(tick,del?deleteSpeed:typeSpeed);
    }
    el.textContent=''; setTimeout(tick,600);
  })();
</script>

</body>
</html>
