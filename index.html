<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mason Swanger — swang.studio</title>
<meta name="description" content="Mason Swanger — Meta creatives, brand visibility, content creation, graphic design, advertising strategy, metric &amp; analytics." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:    #ffffff;
    --ink:   #000000;
    --mute:  #6e6e6e;
    --rule:  rgba(0,0,0,0.10);
  }

  html, body { height: 100%; }
  body {
    font-family: 'Hanken Grotesk', -apple-system, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink);
    background:
      radial-gradient(ellipse at 30% 20%, #faf6ee 0%, #ffffff 55%, #f7f5ef 100%);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    position: relative;
  }
  ::selection { background: var(--ink); color: var(--bg); }
  a { color: inherit; text-decoration: none; }

  /* ── Iridescent slow-drip background ─────────────────────────── */
  .blobs {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    will-change: transform, opacity;
  }
  .blob-1 {
    width: 720px; height: 720px;
    top: -180px; right: -120px;
    background: radial-gradient(circle at 35% 35%,
      rgba(255,250,245,0.85) 0%,
      rgba(255,225,205,0.55) 30%,
      rgba(235,210,240,0.4) 58%,
      rgba(220,235,240,0.25) 78%,
      rgba(255,255,255,0) 100%);
    animation: drift-1 58s ease-in-out infinite;
  }
  .blob-2 {
    width: 620px; height: 620px;
    bottom: -180px; left: -150px;
    background: radial-gradient(circle at 60% 40%,
      rgba(255,250,250,0.85) 0%,
      rgba(240,225,255,0.55) 32%,
      rgba(255,225,205,0.4) 58%,
      rgba(225,240,225,0.22) 80%,
      rgba(255,255,255,0) 100%);
    animation: drift-2 72s ease-in-out infinite;
  }
  .blob-3 {
    width: 380px; height: 380px;
    top: 38%; left: 6%;
    background: radial-gradient(circle at 50% 50%,
      rgba(255,255,255,0.75) 0%,
      rgba(255,240,225,0.5) 42%,
      rgba(245,230,250,0.3) 72%,
      rgba(255,255,255,0) 100%);
    animation: drift-3 64s ease-in-out infinite;
  }
  .blob-4 {
    width: 300px; height: 300px;
    top: 14%; right: 22%;
    background: radial-gradient(circle at 50% 50%,
      rgba(255,255,255,0.8) 0%,
      rgba(220,230,250,0.5) 45%,
      rgba(255,235,225,0.3) 72%,
      rgba(255,255,255,0) 100%);
    animation: drift-4 48s ease-in-out infinite;
  }
  .blob-5 {
    width: 220px; height: 220px;
    bottom: 24%; right: 14%;
    background: radial-gradient(circle at 40% 40%,
      rgba(255,255,255,0.8) 0%,
      rgba(255,225,215,0.5) 50%,
      rgba(245,230,250,0.3) 78%,
      rgba(255,255,255,0) 100%);
    animation: drift-5 54s ease-in-out infinite;
  }
  .blob-6 {
    width: 160px; height: 160px;
    top: 62%; right: 36%;
    background: radial-gradient(circle at 50% 50%,
      rgba(255,255,255,0.78) 0%,
      rgba(225,240,235,0.45) 55%,
      rgba(255,255,255,0) 100%);
    animation: drift-6 42s ease-in-out infinite;
  }

  @keyframes drift-1 {
    0%   { transform: translate(0,0) scale(1);              opacity: 0.55; }
    50%  { transform: translate(-30px,20px) scale(1.06);    opacity: 0.78; }
    100% { transform: translate(0,0) scale(1);              opacity: 0.55; }
  }
  @keyframes drift-2 {
    0%   { transform: translate(0,0) scale(1);              opacity: 0.55; }
    50%  { transform: translate(40px,-30px) scale(1.05);    opacity: 0.75; }
    100% { transform: translate(0,0) scale(1);              opacity: 0.55; }
  }
  @keyframes drift-3 {
    0%   { transform: translate(0,0) scale(1);              opacity: 0.45; }
    50%  { transform: translate(25px,18px) scale(1.08);     opacity: 0.7; }
    100% { transform: translate(0,0) scale(1);              opacity: 0.45; }
  }
  @keyframes drift-4 {
    0%   { transform: translate(0,0) scale(1);              opacity: 0.5; }
    50%  { transform: translate(-20px,30px) scale(1.07);    opacity: 0.72; }
    100% { transform: translate(0,0) scale(1);              opacity: 0.5; }
  }
  @keyframes drift-5 {
    0%   { transform: translate(0,0) scale(1);              opacity: 0.5; }
    50%  { transform: translate(18px,-22px) scale(1.06);    opacity: 0.7; }
    100% { transform: translate(0,0) scale(1);              opacity: 0.5; }
  }
  @keyframes drift-6 {
    0%   { transform: translate(0,0) scale(1);              opacity: 0.4; }
    50%  { transform: translate(-12px,16px) scale(1.05);    opacity: 0.62; }
    100% { transform: translate(0,0) scale(1);              opacity: 0.4; }
  }

  @media (prefers-reduced-motion: reduce) {
    .blob { animation: none; }
  }

  header, main, footer { position: relative; z-index: 1; }
  header, footer { background: transparent; }

  /* ── HEADER — no redundant nav. Just name + typer. ───────────── */
  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--rule);
    gap: 32px;
  }
  .name {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.025em;
    color: var(--ink);
  }
  .typer-wrap {
    display: inline-flex;
    align-items: center;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
  }
  #typer { color: var(--ink); font-weight: 600; }
  .cursor {
    display: inline-block;
    width: 7px;
    height: 14px;
    background: var(--ink);
    margin-left: 3px;
    transform: translateY(2px);
    animation: blink 1.05s steps(2, start) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── MAIN — full-page centered click-through ────────────────── */
  main {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    min-height: 0;
  }
  .menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
  }
  .menu .group {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  /* Primary destinations — enlarged + centered */
  .menu .item {
    display: inline-block;
    padding: 14px 0;
    font-weight: 800;
    font-size: clamp(40px, 6vw, 76px);
    line-height: 1.05;
    letter-spacing: -0.04em;
    color: var(--ink);
    position: relative;
    transition: color 150ms;
  }
  .menu .item::after {
    content: '';
    position: absolute;
    left: 50%;
    bottom: 14px;
    width: 0;
    height: 0.06em;
    background: var(--ink);
    transition: width 240ms cubic-bezier(.4,0,.2,1), left 240ms cubic-bezier(.4,0,.2,1);
  }
  .menu .item:hover::after { width: 100%; left: 0; }
  /* Secondary — about / contact, smaller and not bold */
  .menu .group + .group {
    margin-top: 36px;
    padding-top: 28px;
    border-top: 1px solid var(--rule);
    width: 240px;
    max-width: 80vw;
  }
  .menu .item.small {
    font-weight: 500;
    font-size: clamp(15px, 1.4vw, 17px);
    letter-spacing: 0;
    padding: 6px 0;
  }
  .menu .item.small::after { bottom: 6px; }

  /* ── FOOTER ──────────────────────────────────────────────────── */
  footer {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-top: 1px solid var(--rule);
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
    gap: 16px;
    flex-wrap: wrap;
  }
  footer a { border-bottom: 1px solid transparent; transition: border-color 150ms; }
  footer a:hover { border-bottom-color: var(--ink); }
  footer .sep { color: var(--mute); margin: 0 8px; }

  /* ── RESPONSIVE ──────────────────────────────────────────────── */
  @media (max-width: 760px) {
    .typer-wrap { font-size: 11.5px; }
    .menu .item { font-size: clamp(34px, 9vw, 56px); padding: 10px 0; }
  }
  @media (max-width: 520px) {
    header { padding: 14px 18px; }
    footer { padding: 12px 18px; font-size: 10px; flex-direction: column; align-items: flex-start; gap: 4px; }
    .typer-wrap { font-size: 11px; }
    .name { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="blobs" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="blob blob-5"></div>
  <div class="blob blob-6"></div>
</div>

<header>
  <div class="name">Mason Swanger</div>
  <div class="typer-wrap" aria-hidden="true">
    <span id="typer">Meta Creatives</span>
    <span class="cursor"></span>
  </div>
</header>

<main>
  <nav class="menu" aria-label="Primary navigation">
    <div class="group">
      <a class="item" href="./gallery.html">Gallery</a>
      <a class="item" href="./case-studies.html">Case Studies</a>
      <a class="item" href="./clients.html">Clients</a>
    </div>
    <div class="group">
      <a class="item small" href="./contact.html">contact</a>
    </div>
  </nav>
</main>

<footer>
  <span><a href="mailto:hello@swang.studio">hello@swang.studio</a></span>
  <span>Los Angeles, CA</span>
</footer>

<script>
  (function () {
    const el = document.getElementById('typer');
    const phrases = [
      'Meta Creatives',
      'Brand Visibility',
      'Content Creation',
      'Graphic Design',
      'Advertising Strategy',
      'Metric & Analytics'
    ];
    const typeSpeed   = 110;
    const deleteSpeed = 55;
    const holdEnd     = 3400;
    const holdStart   = 800;

    let pIndex = 0, cIndex = 0, deleting = false;

    function tick() {
      const phrase = phrases[pIndex];
      cIndex += deleting ? -1 : 1;
      el.textContent = phrase.substring(0, cIndex);

      if (!deleting && cIndex === phrase.length) {
        deleting = true;
        setTimeout(tick, holdEnd);
        return;
      }
      if (deleting && cIndex === 0) {
        deleting = false;
        pIndex = (pIndex + 1) % phrases.length;
        setTimeout(tick, holdStart);
        return;
      }
      setTimeout(tick, deleting ? deleteSpeed : typeSpeed);
    }

    el.textContent = '';
    cIndex = 0;
    setTimeout(tick, 600);
  })();
</script>

</body>
</html>
