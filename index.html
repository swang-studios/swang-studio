<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mason Swanger — swang.studio</title>
<meta name="description" content="Mason Swanger — Meta creatives, brand visibility, content creation, graphic design, advertising strategy." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:    #ffffff;
    --ink:   #000000;
    --mute:  #6e6e6e;
    --rule:  rgba(0,0,0,0.10);
  }

  html, body { height: 100%; }
  body {
    font-family: 'Hanken Grotesk', -apple-system, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink);
    background:
      radial-gradient(ellipse at 30% 20%, #faf6ee 0%, #ffffff 55%, #f7f5ef 100%);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    position: relative;
  }
  ::selection { background: var(--ink); color: var(--bg); }
  a { color: inherit; text-decoration: none; }

  /* ── Iridescent slow-drip background ─────────────────────────── */
  .blobs {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    will-change: transform, opacity;
  }
  /* Lava-lamp: orange + purple tinges, slow rise + fall */
  .blob-1 {  /* warm orange — top-right */
    width: 700px; height: 700px;
    top: -120px; right: -120px;
    background: radial-gradient(circle at 35% 35%,
      rgba(255, 155, 95, 0.55) 0%,
      rgba(255, 135, 85, 0.32) 35%,
      rgba(255, 180, 130, 0.16) 62%,
      rgba(255, 255, 255, 0) 100%);
    animation: lava-1 44s ease-in-out infinite alternate;
  }
  .blob-2 {  /* deep purple — bottom-left */
    width: 640px; height: 640px;
    bottom: -150px; left: -150px;
    background: radial-gradient(circle at 60% 40%,
      rgba(165, 105, 215, 0.55) 0%,
      rgba(150, 90, 205, 0.32) 35%,
      rgba(195, 145, 230, 0.16) 65%,
      rgba(255, 255, 255, 0) 100%);
    animation: lava-2 52s ease-in-out infinite alternate;
  }
  .blob-3 {  /* coral — mid-left */
    width: 400px; height: 400px;
    top: 38%; left: 5%;
    background: radial-gradient(circle at 50% 50%,
      rgba(255, 165, 115, 0.48) 0%,
      rgba(255, 140, 95, 0.25) 50%,
      rgba(255, 255, 255, 0) 100%);
    animation: lava-3 38s ease-in-out infinite alternate;
  }
  .blob-4 {  /* lilac — upper-mid-right */
    width: 340px; height: 340px;
    top: 18%; right: 24%;
    background: radial-gradient(circle at 50% 50%,
      rgba(185, 135, 225, 0.48) 0%,
      rgba(165, 110, 210, 0.25) 50%,
      rgba(255, 255, 255, 0) 100%);
    animation: lava-4 42s ease-in-out infinite alternate;
  }
  .blob-5 {  /* sunset orange — lower-right */
    width: 280px; height: 280px;
    bottom: 18%; right: 12%;
    background: radial-gradient(circle at 40% 40%,
      rgba(255, 140, 90, 0.45) 0%,
      rgba(255, 120, 80, 0.22) 55%,
      rgba(255, 255, 255, 0) 100%);
    animation: lava-5 46s ease-in-out infinite alternate;
  }
  .blob-6 {  /* plum — lower-mid */
    width: 240px; height: 240px;
    top: 58%; right: 36%;
    background: radial-gradient(circle at 50% 50%,
      rgba(155, 100, 205, 0.42) 0%,
      rgba(180, 130, 220, 0.22) 55%,
      rgba(255, 255, 255, 0) 100%);
    animation: lava-6 40s ease-in-out infinite alternate;
  }

  /* Each blob rises/falls along Y with subtle X drift, lava-lamp style. */
  @keyframes lava-1 {
    0%   { transform: translate(0, 40px)  scale(0.96); opacity: 0.50; }
    100% { transform: translate(-20px, -50px) scale(1.06); opacity: 0.85; }
  }
  @keyframes lava-2 {
    0%   { transform: translate(0, -30px) scale(0.95); opacity: 0.50; }
    100% { transform: translate(30px, 50px)  scale(1.07); opacity: 0.85; }
  }
  @keyframes lava-3 {
    0%   { transform: translate(0, 24px)  scale(0.96); opacity: 0.42; }
    100% { transform: translate(15px, -40px) scale(1.08); opacity: 0.72; }
  }
  @keyframes lava-4 {
    0%   { transform: translate(0, -20px) scale(0.97); opacity: 0.42; }
    100% { transform: translate(-18px, 36px)  scale(1.07); opacity: 0.72; }
  }
  @keyframes lava-5 {
    0%   { transform: translate(0, 18px)  scale(0.96); opacity: 0.40; }
    100% { transform: translate(12px, -30px) scale(1.06); opacity: 0.68; }
  }
  @keyframes lava-6 {
    0%   { transform: translate(0, -14px) scale(0.96); opacity: 0.40; }
    100% { transform: translate(-10px, 26px) scale(1.05); opacity: 0.65; }
  }

  @media (prefers-reduced-motion: reduce) {
    .blob { animation: none; }
  }

  header, main, footer { position: relative; z-index: 1; }
  header, footer { background: transparent; }

  /* ── HEADER — no redundant nav. Just name + typer. ───────────── */
  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--rule);
    gap: 32px;
  }
  .name {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.025em;
    color: var(--ink);
  }
  .typer-wrap {
    display: inline-flex;
    align-items: center;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
  }
  #typer { color: var(--ink); font-weight: 600; }
  .cursor {
    display: inline-block;
    width: 7px;
    height: 14px;
    background: var(--ink);
    margin-left: 3px;
    transform: translateY(2px);
    animation: blink 1.05s steps(2, start) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── MAIN — full-page centered click-through ────────────────── */
  main {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    min-height: 0;
  }
  .menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
  }
  .menu .group {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  /* Primary destinations — enlarged + centered */
  .menu .item {
    display: inline-block;
    padding: 14px 0;
    font-weight: 800;
    font-size: clamp(40px, 6vw, 76px);
    line-height: 1.05;
    letter-spacing: -0.04em;
    color: var(--ink);
    position: relative;
    transition: color 150ms;
  }
  .menu .item::after {
    content: '';
    position: absolute;
    left: 50%;
    bottom: 14px;
    width: 0;
    height: 0.06em;
    background: var(--ink);
    transition: width 240ms cubic-bezier(.4,0,.2,1), left 240ms cubic-bezier(.4,0,.2,1);
  }
  .menu .item:hover::after { width: 100%; left: 0; }
  /* Secondary — about / contact, smaller and not bold */
  .menu .group + .group {
    margin-top: 36px;
    padding-top: 28px;
    border-top: 1px solid var(--rule);
    width: 240px;
    max-width: 80vw;
  }
  .menu .item.small {
    font-weight: 500;
    font-size: clamp(15px, 1.4vw, 17px);
    letter-spacing: 0;
    padding: 6px 0;
  }
  .menu .item.small::after { bottom: 6px; }

  /* ── FOOTER ──────────────────────────────────────────────────── */
  footer {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-top: 1px solid var(--rule);
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
    gap: 16px;
    flex-wrap: wrap;
  }
  footer a { border-bottom: 1px solid transparent; transition: border-color 150ms; }
  footer a:hover { border-bottom-color: var(--ink); }
  footer .sep { color: var(--mute); margin: 0 8px; }

  /* ── RESPONSIVE ──────────────────────────────────────────────── */
  @media (max-width: 760px) {
    .typer-wrap { font-size: 11.5px; }
    .menu .item { font-size: clamp(34px, 9vw, 56px); padding: 10px 0; }
  }
  @media (max-width: 520px) {
    header { padding: 14px 18px; }
    footer { padding: 12px 18px; font-size: 10px; flex-direction: column; align-items: flex-start; gap: 4px; }
    .typer-wrap { font-size: 11px; }
    .name { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="blobs" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="blob blob-5"></div>
  <div class="blob blob-6"></div>
</div>

<header>
  <div class="name">Mason Swanger</div>
  <div class="typer-wrap" aria-hidden="true">
    <span id="typer">Meta Creatives</span>
    <span class="cursor"></span>
  </div>
</header>

<main>
  <nav class="menu" aria-label="Primary navigation">
    <div class="group">
      <a class="item" href="./gallery.html">Gallery</a>
      <a class="item" href="./case-studies.html">Case Studies</a>
      <a class="item" href="./clients.html">Clients</a>
    </div>
    <div class="group">
      <a class="item small" href="./about.html">about</a>
      <a class="item small" href="./contact.html">contact</a>
    </div>
  </nav>
</main>

<footer>
  <span><a href="mailto:hello@swang.studio">hello@swang.studio</a></span>
  <span>Los Angeles, CA</span>
</footer>

<script>
  (function () {
    const el = document.getElementById('typer');
    const phrases = [
      'Meta Creatives',
      'Brand Visibility',
      'Content Creation',
      'Graphic Design',
      'Advertising Strategy'
    ];
    const typeSpeed   = 110;
    const deleteSpeed = 55;
    const holdEnd     = 3400;
    const holdStart   = 800;

    let pIndex = 0, cIndex = 0, deleting = false;

    function tick() {
      const phrase = phrases[pIndex];
      cIndex += deleting ? -1 : 1;
      el.textContent = phrase.substring(0, cIndex);

      if (!deleting && cIndex === phrase.length) {
        deleting = true;
        setTimeout(tick, holdEnd);
        return;
      }
      if (deleting && cIndex === 0) {
        deleting = false;
        pIndex = (pIndex + 1) % phrases.length;
        setTimeout(tick, holdStart);
        return;
      }
      setTimeout(tick, deleting ? deleteSpeed : typeSpeed);
    }

    el.textContent = '';
    cIndex = 0;
    setTimeout(tick, 600);
  })();
</script>

</body>
</html>
