<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mason Swanger — swang.studio</title>
<meta name="description" content="Mason Swanger — Meta creatives, brand visibility, content creation, graphic design, advertising strategy." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:    #ffffff;
    --ink:   #000000;
    --mute:  #6e6e6e;
    --rule:  rgba(0,0,0,0.10);
  }

  html, body { height: 100%; }
  body {
    font-family: 'Hanken Grotesk', -apple-system, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink);
    background:
      radial-gradient(ellipse at 30% 20%, #faf6ee 0%, #ffffff 55%, #f7f5ef 100%);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    position: relative;
  }
  ::selection { background: var(--ink); color: var(--bg); }
  a { color: inherit; text-decoration: none; }

  /* ── Iridescent slow-drip background ─────────────────────────── */
  .blobs {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    will-change: transform, opacity;
  }
  /* Lava-lamp: bubbles emerge from edges, drift INWARD, then fade.
     Heavier saturation than before — Mason wants it visible but still lowkey. */
  .blob-1 {  /* warm orange — emerges top-right, drifts inward-down */
    width: 560px; height: 560px;
    top: -80px; right: -80px;
    background: radial-gradient(circle at 50% 50%,
      rgba(255, 130, 70, 0.78) 0%,
      rgba(255, 110, 60, 0.45) 35%,
      rgba(255, 165, 110, 0.20) 65%,
      rgba(255, 255, 255, 0) 100%);
    animation: bubble-tr 46s ease-in-out infinite;
  }
  .blob-2 {  /* deep purple — emerges bottom-left, drifts inward-up */
    width: 600px; height: 600px;
    bottom: -100px; left: -100px;
    background: radial-gradient(circle at 50% 50%,
      rgba(150, 80, 215, 0.75) 0%,
      rgba(135, 65, 200, 0.42) 35%,
      rgba(180, 125, 230, 0.20) 65%,
      rgba(255, 255, 255, 0) 100%);
    animation: bubble-bl 54s ease-in-out infinite;
  }
  .blob-3 {  /* coral — emerges left edge mid, drifts toward center */
    width: 380px; height: 380px;
    top: 32%; left: -60px;
    background: radial-gradient(circle at 50% 50%,
      rgba(255, 140, 90, 0.65) 0%,
      rgba(255, 120, 80, 0.32) 50%,
      rgba(255, 255, 255, 0) 100%);
    animation: bubble-l 40s ease-in-out infinite;
  }
  .blob-4 {  /* lilac — emerges top edge mid-right, drifts down */
    width: 320px; height: 320px;
    top: -60px; right: 28%;
    background: radial-gradient(circle at 50% 50%,
      rgba(175, 115, 225, 0.65) 0%,
      rgba(155, 95, 210, 0.32) 50%,
      rgba(255, 255, 255, 0) 100%);
    animation: bubble-t 50s ease-in-out infinite;
  }
  .blob-5 {  /* sunset orange — emerges right edge mid-bottom, drifts inward */
    width: 300px; height: 300px;
    bottom: 22%; right: -50px;
    background: radial-gradient(circle at 50% 50%,
      rgba(255, 115, 70, 0.62) 0%,
      rgba(255, 100, 60, 0.30) 55%,
      rgba(255, 255, 255, 0) 100%);
    animation: bubble-r 44s ease-in-out infinite;
  }
  .blob-6 {  /* plum — emerges bottom edge mid, drifts up */
    width: 260px; height: 260px;
    bottom: -50px; right: 38%;
    background: radial-gradient(circle at 50% 50%,
      rgba(140, 80, 200, 0.60) 0%,
      rgba(170, 115, 220, 0.30) 55%,
      rgba(255, 255, 255, 0) 100%);
    animation: bubble-b 48s ease-in-out infinite;
  }

  /* Each bubble drifts INWARD away from its wall, then back —
     classic lava-lamp blob detachment, with peak in middle of cycle. */
  @keyframes bubble-tr {
    0%   { transform: translate(0, 0)            scale(0.95); opacity: 0.55; }
    50%  { transform: translate(-90px, 120px)    scale(1.10); opacity: 0.95; }
    100% { transform: translate(0, 0)            scale(0.95); opacity: 0.55; }
  }
  @keyframes bubble-bl {
    0%   { transform: translate(0, 0)            scale(0.95); opacity: 0.55; }
    50%  { transform: translate(110px, -130px)   scale(1.10); opacity: 0.95; }
    100% { transform: translate(0, 0)            scale(0.95); opacity: 0.55; }
  }
  @keyframes bubble-l {
    0%   { transform: translate(0, 0)            scale(0.92); opacity: 0.45; }
    50%  { transform: translate(140px, -20px)    scale(1.12); opacity: 0.82; }
    100% { transform: translate(0, 0)            scale(0.92); opacity: 0.45; }
  }
  @keyframes bubble-t {
    0%   { transform: translate(0, 0)            scale(0.92); opacity: 0.45; }
    50%  { transform: translate(-30px, 150px)    scale(1.12); opacity: 0.82; }
    100% { transform: translate(0, 0)            scale(0.92); opacity: 0.45; }
  }
  @keyframes bubble-r {
    0%   { transform: translate(0, 0)            scale(0.92); opacity: 0.45; }
    50%  { transform: translate(-130px, -30px)   scale(1.12); opacity: 0.78; }
    100% { transform: translate(0, 0)            scale(0.92); opacity: 0.45; }
  }
  @keyframes bubble-b {
    0%   { transform: translate(0, 0)            scale(0.92); opacity: 0.45; }
    50%  { transform: translate(30px, -140px)    scale(1.12); opacity: 0.78; }
    100% { transform: translate(0, 0)            scale(0.92); opacity: 0.45; }
  }

  @media (prefers-reduced-motion: reduce) {
    .blob { animation: none; }
  }

  header, main, footer { position: relative; z-index: 1; }
  header, footer { background: transparent; }

  /* ── HEADER — no redundant nav. Just name + typer. ───────────── */
  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--rule);
    gap: 32px;
  }
  .name {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.025em;
    color: var(--ink);
  }
  .typer-wrap {
    display: inline-flex;
    align-items: center;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
  }
  #typer { color: var(--ink); font-weight: 600; }
  .cursor {
    display: inline-block;
    width: 7px;
    height: 14px;
    background: var(--ink);
    margin-left: 3px;
    transform: translateY(2px);
    animation: blink 1.05s steps(2, start) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── MAIN — full-page centered click-through ────────────────── */
  main {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    min-height: 0;
  }
  .menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
  }
  .menu .group {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  /* Primary destinations — enlarged + centered */
  .menu .item {
    display: inline-block;
    padding: 14px 0;
    font-weight: 800;
    font-size: clamp(40px, 6vw, 76px);
    line-height: 1.05;
    letter-spacing: -0.04em;
    color: var(--ink);
    position: relative;
    transition: color 150ms;
  }
  .menu .item::after {
    content: '';
    position: absolute;
    left: 50%;
    bottom: 14px;
    width: 0;
    height: 0.06em;
    background: var(--ink);
    transition: width 240ms cubic-bezier(.4,0,.2,1), left 240ms cubic-bezier(.4,0,.2,1);
  }
  .menu .item:hover::after { width: 100%; left: 0; }
  /* Secondary block — brief about + mailto contact line */
  .menu .about-block {
    margin-top: 36px;
    padding-top: 28px;
    border-top: 1px solid var(--rule);
    width: clamp(280px, 40vw, 520px);
    max-width: 92vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 14px;
  }
  .menu .about-label {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--mute);
  }
  .menu .about-text {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 8px;
    color: var(--ink);
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.25;
    width: 100%;
  }
  /* Stacked, centered, small -> big. nowrap so each line stays on one line. */
  .menu .about-text .ln { white-space: nowrap; }
  /* All three lines share the lighter "Born and Raised" treatment —
     same size, same weight, no bolding or size escalation. */
  .menu .about-text .ln-1,
  .menu .about-text .ln-2,
  .menu .about-text .ln-3 {
    font-size: clamp(11px, 1.6vw, 15px);
    font-weight: 500;
    color: var(--mute);
    letter-spacing: -0.01em;
  }
  .menu .contact-row {
    display: inline-flex;
    align-items: baseline;
    gap: 10px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--ink);
  }
  .menu .contact-row .lbl {
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--mute);
  }
  .menu .contact-row .sep { color: var(--mute); }
  .menu .contact-row a {
    position: relative;
    color: var(--ink);
    font-weight: 700;
  }
  .menu .contact-row a::after {
    content: ''; position: absolute; left: 50%; bottom: -2px;
    width: 0; height: 1px; background: var(--ink);
    transition: width 240ms cubic-bezier(.4,0,.2,1), left 240ms cubic-bezier(.4,0,.2,1);
  }
  .menu .contact-row a:hover::after { width: 100%; left: 0; }

  /* ── FOOTER ──────────────────────────────────────────────────── */
  footer {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-top: 1px solid var(--rule);
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
    gap: 16px;
    flex-wrap: wrap;
  }
  footer a { border-bottom: 1px solid transparent; transition: border-color 150ms; }
  footer a:hover { border-bottom-color: var(--ink); }
  footer .sep { color: var(--mute); margin: 0 8px; }
  footer .services { color: var(--ink); white-space: nowrap; }
  footer .services .dot { color: var(--mute); margin: 0 10px; }

  /* ── RESPONSIVE ──────────────────────────────────────────────── */
  @media (max-width: 760px) {
    .typer-wrap { font-size: 11.5px; }
    .menu .item { font-size: clamp(34px, 9vw, 56px); padding: 10px 0; }
  }
  @media (max-width: 520px) {
    header { padding: 14px 18px; }
    footer { padding: 12px 18px; font-size: 10px; flex-direction: column; align-items: flex-start; gap: 4px; }
    .typer-wrap { font-size: 11px; }
    .name { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="blobs" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="blob blob-5"></div>
  <div class="blob blob-6"></div>
</div>

<header>
  <div class="name">Mason Swanger</div>
  <div class="typer-wrap" aria-hidden="true">
    <span id="typer">Meta Creatives</span>
    <span class="cursor"></span>
  </div>
</header>

<main>
  <nav class="menu" aria-label="Primary navigation">
    <div class="group">
      <a class="item" href="./gallery.html">Gallery</a>
      <a class="item" href="./case-studies.html">Case Studies</a>
      <a class="item" href="./clients.html">Clients</a>
    </div>
    <div class="about-block">
      <span class="about-label">About</span>
      <p class="about-text" id="about-text">
        <span class="ln ln-1">Born and Raised in California</span>
        <span class="ln ln-2">Engaging and Converting Content Approaches</span>
        <span class="ln ln-3">Passionate about connecting businesses to it's ideal audience</span>
      </p>
      <p class="contact-row">
        <span class="lbl">contact</span>
        <span class="sep">—</span>
        <a href="mailto:hello@swang.studio?subject=Getting%20in%20Touch">hello@swang.studio</a>
      </p>
    </div>
  </nav>
</main>

<footer>
  <span><a href="mailto:hello@swang.studio">hello@swang.studio</a></span>
  <span>Los Angeles, CA</span>
</footer>

<script>
  (function () {
    const el = document.getElementById('typer');
    const phrases = [
      'Meta Creatives',
      'Brand Visibility',
      'Content Creation',
      'Graphic Design',
      'Advertising Strategy'
    ];
    // Slower than before — Mason wants it more relaxed.
    const typeSpeed   = 150;
    const deleteSpeed = 75;
    const holdEnd     = 5000;
    const holdStart   = 1200;

    // Each page starts on a different phrase so clicking around varies the cycle.
    const pageOffsets = {
      'index.html': 0, '': 0, '/': 0,
      'gallery.html': 1,
      'case-studies.html': 2,
      'clients.html': 3,
      'about.html': 4,
      'contact.html': 1
    };
    const pageName = (location.pathname.split('/').pop() || 'index.html').toLowerCase();

    let pIndex   = pageOffsets[pageName] != null ? pageOffsets[pageName] : 0;
    let cIndex   = 0;
    let deleting = false;

    function tick() {
      const phrase = phrases[pIndex];
      cIndex += deleting ? -1 : 1;
      el.textContent = phrase.substring(0, cIndex);

      if (!deleting && cIndex === phrase.length) {
        deleting = true;
        setTimeout(tick, holdEnd);
        return;
      }
      if (deleting && cIndex <= 0) {
        cIndex = 0;
        deleting = false;
        pIndex = (pIndex + 1) % phrases.length;  // loops forever
        setTimeout(tick, holdStart);
        return;
      }
      setTimeout(tick, deleting ? deleteSpeed : typeSpeed);
    }

    el.textContent = '';
    setTimeout(tick, 600);
  })();
</script>

</body>
</html>
