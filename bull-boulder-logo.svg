<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Bull Boulder Tow Hitches">
  <defs>
    <linearGradient id="bbBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1628"/>
      <stop offset="0.55" stop-color="#102444"/>
      <stop offset="1" stop-color="#1d3660"/>
    </linearGradient>
    <!-- stripes pattern scoped to the horizontal bar -->
    <pattern id="bbStripes" patternUnits="userSpaceOnUse" x="0" y="0" width="600" height="18">
      <rect width="600" height="9" fill="#c8102e"/>
      <rect y="9" width="600" height="9" fill="#ffffff"/>
    </pattern>
  </defs>

  <!-- Dark panel background (so the SVG can sit on any backdrop) -->
  <rect width="600" height="400" fill="url(#bbBg)"/>

  <!-- Star row above wordmark -->
  <g fill="#ffffff" transform="translate(300 110)">
    <g id="bbStarSm"><polygon points="0,-14 4,-4 15,-4 6,3 9,14 0,7 -9,14 -6,3 -15,-4 -4,-4"/></g>
    <use href="#bbStarSm" x="-120"/>
    <use href="#bbStarSm" x="-60"/>
    <use href="#bbStarSm" x="0"/>
    <use href="#bbStarSm" x="60"/>
    <use href="#bbStarSm" x="120"/>
  </g>

  <!-- BULL BOULDER wordmark (textLength locks it to fit the viewBox) -->
  <text x="300" y="210"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="72"
        letter-spacing="2"
        textLength="520"
        lengthAdjust="spacingAndGlyphs"
        fill="#f5fbff">BULL BOULDER</text>

  <!-- Horizontal stripe bar with TOW HITCHES carved out -->
  <g transform="translate(80 240)">
    <rect width="440" height="54" fill="url(#bbStripes)" rx="3"/>
    <rect width="440" height="54" fill="none" stroke="#0b0e14" stroke-width="2" rx="3"/>
  </g>
  <text x="300" y="278"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="28"
        letter-spacing="12"
        fill="#0b0e14"
        style="paint-order:stroke;stroke:#ffffff;stroke-width:6;stroke-linejoin:round">TOW HITCHES</text>

  <!-- Subline -->
  <text x="300" y="340"
        text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="700"
        font-size="14"
        letter-spacing="6"
        fill="#9FD4F5">META CAMPAIGN, DTC, 2 OF 6 WINNERS</text>
</svg>
