             L 90 295
             L 80 292
             L 72 285
             L 65 278
             Z
             M 390 110
             L 405 95
             L 415 105
             L 418 120
             L 430 125
             L 442 118
             L 446 130
             L 438 140
             L 425 140
             Z"
          fill="none" stroke="#0b0e14" stroke-width="4" stroke-linejoin="round"/>
    <!-- Eye (small red dot to match raging bull vibe) -->
    <circle cx="458" cy="188" r="3.5" fill="#c8102e"/>
    <!-- Nostril -->
    <circle cx="498" cy="215" r="2.5" fill="#0b0e14"/>
    <!-- Tail -->
    <path d="M 60 270 C 40 260, 30 245, 45 230 C 50 240, 58 250, 60 270 Z" fill="#0b0e14"/>
  </g>
</svg>
