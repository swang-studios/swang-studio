<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clients — Mason Swanger</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#ffffff; --ink:#000000; --mute:#6e6e6e; --rule:rgba(0,0,0,0.10); }
  html, body { height: 100%; }
  body {
    font-family: 'Hanken Grotesk', -apple-system, system-ui, sans-serif;
    font-size: 14px; line-height: 1.5; color: var(--ink); background: var(--bg);
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column; min-height: 100vh;
    overflow: hidden;
  }
  ::selection { background: var(--ink); color: var(--bg); }
  a { color: inherit; text-decoration: none; }

  /* HEADER */
  header {
    flex: 0 0 auto;
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; padding: 18px 28px;
    border-bottom: 1px solid var(--rule);
    background: var(--bg); gap: 32px; z-index: 50;
  }
  .name {
    justify-self: start; font-weight: 700; font-size: 15px;
    letter-spacing: -0.025em; color: var(--ink);
    border-bottom: 1px solid transparent; padding-bottom: 1px;
    transition: border-color 150ms;
  }
  .name:hover { border-bottom-color: var(--ink); }
  .typer-wrap {
    justify-self: center; display: inline-flex; align-items: center;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap;
  }
  #typer { color: var(--ink); font-weight: 600; }
  .cursor {
    display: inline-block; width: 7px; height: 14px; background: var(--ink);
    margin-left: 3px; transform: translateY(2px);
    animation: blink 1.05s steps(2, start) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  nav.primary { justify-self: end; display: flex; align-items: center; gap: 18px; }
  nav.primary a {
    font-size: 13px; font-weight: 500; letter-spacing: -0.005em;
    color: var(--ink); padding: 4px 0;
    border-bottom: 1px solid transparent;
    transition: border-color 150ms; white-space: nowrap;
  }
  nav.primary a:hover, nav.primary a.active { border-bottom-color: var(--ink); }
  nav.primary .pipe { color: var(--rule); font-weight: 300; user-select: none; }

  /* ── FLOATING LOGO STAGE ──────────────────────────────────── */
  .float-stage {
    flex: 1 1 auto;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 30% 25%, #fbfaf6 0%, #ffffff 60%, #f7f5ef 100%);
  }
  .logo-float {
    position: absolute;
    transform: translate(-50%, -50%);
    display: flex; align-items: center; justify-content: center;
    will-change: transform, opacity;
    pointer-events: none;
  }
  .logo-float img {
    max-width: 100%; max-height: 100%;
    object-fit: contain; display: block;
    /* native colors — no desaturation */
  }
  .logo-float.type-text {
    font-weight: 900;
    color: var(--ink);
    text-align: center;
    line-height: 0.95;
    letter-spacing: -0.04em;
    white-space: nowrap;
  }
  .logo-float.type-text .small-line {
    display: block;
    font-size: 0.30em;
    font-weight: 500;
    letter-spacing: 0.22em;
    margin-top: 4px;
    color: var(--mute);
  }

  /* Positions + sizes — staggered drift + pulse via individual keyframes */
  .l-im8        { left: 18%; top: 24%; width: 190px; height: 110px; font-size: 64px;
                  animation: float-a 11s ease-in-out infinite; }
  .l-pto        { left: 54%; top: 17%; width: 200px; height: 110px; font-size: 30px;
                  animation: float-b 13s ease-in-out infinite; }
  .l-bng        { left: 82%; top: 26%; width: 130px; height: 90px;
                  animation: float-c 9.5s ease-in-out infinite; }
  .l-bull       { left: 28%; top: 50%; width: 160px; height: 110px;
                  animation: float-d 12s ease-in-out infinite; }
  .l-alyssa     { left: 60%; top: 46%; width: 150px; height: 100px;
                  animation: float-e 10.5s ease-in-out infinite; }
  .l-noah       { left: 88%; top: 60%; width: 130px; height: 80px; font-size: 22px;
                  animation: float-f 12.5s ease-in-out infinite; }
  .l-shaadie    { left: 16%; top: 76%; width: 140px; height: 90px;
                  animation: float-g 11.5s ease-in-out infinite; }
  .l-cpg        { left: 48%; top: 80%; width: 150px; height: 100px;
                  animation: float-h 10s ease-in-out infinite; }
  .l-jama       { left: 78%; top: 76%; width: 130px; height: 70px; font-size: 22px;
                  animation: float-i 13s ease-in-out infinite; }

  @keyframes float-a {
    0%   { transform: translate(-50%, -50%) translateY(0)     scale(1);    opacity: 0.92; }
    50%  { transform: translate(-50%, -50%) translateY(-10px) scale(1.04); opacity: 1;    }
    100% { transform: translate(-50%, -50%) translateY(0)     scale(1);    opacity: 0.92; }
  }
  @keyframes float-b {
    0%   { transform: translate(-50%, -50%) translateY(0)    scale(1);    opacity: 0.9;  }
    50%  { transform: translate(-50%, -50%) translateY(8px)  scale(1.05); opacity: 1;    }
    100% { transform: translate(-50%, -50%) translateY(0)    scale(1);    opacity: 0.9;  }
  }
  @keyframes float-c {
    0%   { transform: translate(-50%, -50%) translateY(0)     scale(1);    opacity: 0.92; }
    50%  { transform: translate(-50%, -50%) translateY(-12px) scale(1.06); opacity: 1;    }
    100% { transform: translate(-50%, -50%) translateY(0)     scale(1);    opacity: 0.92; }
  }
  @keyframes float-d {
    0%   { transform: translate(-50%, -50%) translateY(0)    scale(1);    opacity: 0.9;  }
    50%  { transform: translate(-50%, -50%) translateY(10px) scale(1.05); opacity: 1;    }
    100% { transform: translate(-50%, -50%) translateY(0)    scale(1);    opacity: 0.9;  }
  }
  @keyframes float-e {
    0%   { transform: translate(-50%, -50%) translateY(0)     scale(1);    opacity: 0.92; }
    50%  { transform: translate(-50%, -50%) translateY(-9px)  scale(1.04); opacity: 1;    }
    100% { transform: translate(-50%, -50%) translateY(0)     scale(1);    opacity: 0.92; }
  }
  @keyframes float-f {
    0%   { transform: translate(-50%, -50%) translateY(0)    scale(1);    opacity: 0.9;  }
    50%  { transform: translate(-50%, -50%) translateY(12px) scale(1.06); opacity: 1;    }
    100% { transform: translate(-50%, -50%) translateY(0)    scale(1);    opacity: 0.9;  }
  }
  @keyframes float-g {
    0%   { transform: translate(-50%, -50%) translateY(0)     scale(1);    opacity: 0.92; }
    50%  { transform: translate(-50%, -50%) translateY(-11px) scale(1.05); opacity: 1;    }
    100% { transform: translate(-50%, -50%) translateY(0)     scale(1);    opacity: 0.92; }
  }
  @keyframes float-h {
    0%   { transform: translate(-50%, -50%) translateY(0)    scale(1);    opacity: 0.92; }
    50%  { transform: translate(-50%, -50%) translateY(9px)  scale(1.04); opacity: 1;    }
    100% { transform: translate(-50%, -50%) translateY(0)    scale(1);    opacity: 0.92; }
  }
  @keyframes float-i {
    0%   { transform: translate(-50%, -50%) translateY(0)     scale(1);    opacity: 0.9;  }
    50%  { transform: translate(-50%, -50%) translateY(-8px)  scale(1.05); opacity: 1;    }
    100% { transform: translate(-50%, -50%) translateY(0)     scale(1);    opacity: 0.9;  }
  }

  @media (prefers-reduced-motion: reduce) {
    .logo-float { animation: none !important; }
  }

  /* FOOTER */
  footer {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px; border-top: 1px solid var(--rule);
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--ink); gap: 16px; flex-wrap: wrap;
    background: var(--bg); z-index: 10;
  }
  footer a { border-bottom: 1px solid transparent; transition: border-color 150ms; }
  footer a:hover { border-bottom-color: var(--ink); }
  footer .sep { color: var(--mute); margin: 0 8px; }

  @media (max-width: 980px) {
    header { grid-template-columns: auto 1fr; gap: 14px; }
    .typer-wrap { display: none; }
    nav.primary { justify-self: end; gap: 12px; }
    nav.primary a { font-size: 12px; }
    .l-im8     { width: 140px; height: 80px; font-size: 46px; }
    .l-pto     { width: 150px; height: 80px; font-size: 22px; }
    .l-bng, .l-bull, .l-alyssa, .l-shaadie, .l-cpg { width: 110px; height: 70px; }
    .l-noah, .l-jama { width: 100px; height: 56px; font-size: 18px; }
  }
  @media (max-width: 520px) {
    header { padding: 14px 18px; }
    nav.primary .pipe { display: none; }
    nav.primary a { font-size: 11px; }
    footer { padding: 12px 18px; font-size: 10px; flex-direction: column; align-items: flex-start; gap: 4px; }
    .l-im8     { width: 90px; height: 56px; font-size: 30px; }
    .l-pto     { width: 110px; height: 56px; font-size: 16px; }
    .l-bng, .l-bull, .l-alyssa, .l-shaadie, .l-cpg { width: 78px; height: 50px; }
    .l-noah, .l-jama { width: 78px; height: 44px; font-size: 14px; }
  }
</style>
</head>
<body>

<header>
  <a href="./index.html" class="name">Mason Swanger</a>
  <div class="typer-wrap" aria-hidden="true">
    <span id="typer">Meta Creatives</span>
    <span class="cursor"></span>
  </div>
  <nav class="primary">
    <a href="./gallery.html">Gallery</a>
    <span class="pipe">|</span>
    <a href="./case-studies.html">Case Studies</a>
    <span class="pipe">|</span>
    <a href="./clients.html" class="active">Clients</a>
  </nav>
</header>

<main class="float-stage" aria-label="Clients (logos pending)"></main>

<footer>
  <span><a href="mailto:hello@swang.studio">hello@swang.studio</a></span>
  <span>Los Angeles, CA</span>
</footer>

<script>
  (function () {
    const el = document.getElementById('typer');
    const phrases = ['Meta Creatives','Brand Visibility','Content Creation','Graphic Design','Advertising Strategy','Metric & Analytics'];
    const typeSpeed=110, deleteSpeed=55, holdEnd=3400, holdStart=800;
    let p=0, c=0, del=false;
    function tick(){
      const ph=phrases[p]; c+=del?-1:1;
      el.textContent=ph.substring(0,c);
      if(!del&&c===ph.length){del=true;setTimeout(tick,holdEnd);return;}
      if(del&&c===0){del=false;p=(p+1)%phrases.length;setTimeout(tick,holdStart);return;}
      setTimeout(tick,del?deleteSpeed:typeSpeed);
    }
    el.textContent=''; setTimeout(tick,600);
  })();
</script>

</body>
</html>
