<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#ffffff; --ink:#000000; --mute:#6e6e6e; --rule:rgba(0,0,0,0.10); }
  html, body { height: 100%; }
  body {
    font-family: 'Hanken Grotesk', -apple-system, system-ui, sans-serif;
    font-size: 14px; line-height: 1.5; color: var(--ink); background: var(--bg);
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column; min-height: 100vh;
    overflow-x: hidden;
  }
  ::selection { background: var(--ink); color: var(--bg); }
  a { color: inherit; text-decoration: none; }

  /* HEADER */
  header {
    flex: 0 0 auto;
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; padding: 18px 28px;
    border-bottom: 1px solid var(--rule);
    background: var(--bg); gap: 32px; z-index: 50;
  }
  .name {
    justify-self: start; font-weight: 700; font-size: 15px;
    letter-spacing: -0.025em; color: var(--ink);
    display: inline-flex; align-items: baseline; gap: 6px;
    border-bottom: 1px solid transparent; padding-bottom: 1px;
    transition: border-color 150ms;
  }
  .name .arrow {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-weight: 500; font-size: 13px; color: var(--mute);
    transition: transform 200ms, color 200ms;
  }
  .name:hover { border-bottom-color: var(--ink); }
  .name:hover .arrow { transform: translateX(-2px); color: var(--ink); }
  .typer-wrap {
    justify-self: center; display: inline-flex; align-items: center;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap;
  }
  #typer { color: var(--ink); font-weight: 600; }
  .cursor {
    display: inline-block; width: 7px; height: 14px; background: var(--ink);
    margin-left: 3px; transform: translateY(2px);
    animation: blink 1.05s steps(2, start) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  nav.primary { justify-self: end; display: flex; align-items: center; gap: 18px; }
  nav.primary a {
    font-size: 13px; font-weight: 500; letter-spacing: -0.005em;
    color: var(--ink); padding: 4px 0;
    border-bottom: 1px solid transparent;
    transition: border-color 150ms; white-space: nowrap;
  }
  nav.primary a:hover, nav.primary a.active { border-bottom-color: var(--ink); }
  nav.primary .pipe { color: var(--rule); font-weight: 300; user-select: none; }

  /* ── CLIENT LOGO GRID ─────────────────────────────────────── */
  .stage {
    flex: 1 1 auto;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 48px 28px 56px;
    background:
      radial-gradient(ellipse at 30% 25%, #fbfaf6 0%, #ffffff 60%, #f7f5ef 100%);
  }
  .stage-head {
    text-align: center; margin-bottom: 34px; max-width: 640px;
  }
  .stage-head .eyebrow {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--mute);
  }
  .stage-head h1 {
    font-size: clamp(26px, 4vw, 40px); font-weight: 800;
    letter-spacing: -0.03em; margin-top: 8px; color: var(--ink);
  }
  .logo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    width: 100%; max-width: 840px;
  }
  .logo-tile {
    position: relative;
    aspect-ratio: 1 / 1;
    background: #ffffff;
    border: 1px solid var(--rule);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    padding: 22px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    transition: transform 260ms cubic-bezier(.2,.7,.2,1),
                box-shadow 260ms ease,
                border-color 260ms ease;
    will-change: transform;
    cursor: pointer;
  }
  .logo-tile img {
    max-width: 100%; max-height: 100%;
    width: auto; height: auto;
    object-fit: contain; display: block;
    transition: transform 260ms cubic-bezier(.2,.7,.2,1);
  }
  /* Hover: tile lifts, shadow deepens, logo scales slightly */
  .logo-tile:hover,
  .logo-tile:focus-visible {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 18px 38px rgba(0,0,0,0.13);
    border-color: rgba(0,0,0,0.18);
    outline: none;
  }
  .logo-tile:hover img,
  .logo-tile:focus-visible img { transform: scale(1.06); }

  @media (prefers-reduced-motion: reduce) {
    .logo-tile, .logo-tile img { transition: none !important; }
  }

  /* FOOTER */
  footer {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px; border-top: 1px solid var(--rule);
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--ink); gap: 16px; flex-wrap: wrap;
    background: var(--bg); z-index: 10;
  }
  footer a { border-bottom: 1px solid transparent; transition: border-color 150ms; }
  footer a:hover { border-bottom-color: var(--ink); }
  footer .sep { color: var(--mute); margin: 0 8px; }

  @media (max-width: 980px) {
    header { grid-template-columns: auto 1fr; gap: 14px; }
    .typer-wrap { display: none; }
    nav.primary { justify-self: end; gap: 12px; }
    nav.primary a { font-size: 12px; }
    .logo-grid { max-width: 600px; gap: 16px; }
    .logo-tile { padding: 18px; border-radius: 16px; }
  }
  @media (max-width: 560px) {
    header { padding: 14px 18px; }
    nav.primary .pipe { display: none; }
    nav.primary a { font-size: 11px; }
    footer { padding: 12px 18px; font-size: 10px; flex-direction: column; align-items: flex-start; gap: 4px; }
    .stage { padding: 32px 18px 40px; }
    .stage-head { margin-bottom: 24px; }
    .logo-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 380px; }
    .logo-tile { padding: 14px; border-radius: 14px; }
  }
</style>
</head>
<body>

<header>
  <a href="./index.html" class="name"><span class="arrow">←</span> Mason Swanger</a>
  <div class="typer-wrap" aria-hidden="true">
    <span id="typer">Meta Creatives</span>
    <span class="cursor"></span>
  </div>
  <nav class="primary">
    <a href="./gallery.html">Gallery</a>
    <span class="pipe">|</span>
    <a href="./case-studies.html">Case Studies</a>
    <span class="pipe">|</span>
    <a href="./clients.html" class="active">Clients</a>
  </nav>
</header>

<main class="stage" aria-label="Clients">
  <div class="stage-head">
    <span class="eyebrow">Selected Clients</span>
    <h1>Brands I've worked with</h1>
  </div>
  <div class="logo-grid">
    <div class="logo-tile" tabindex="0"><img src="./client-logos/shaadiefit.png" alt="ShaadieFit" loading="lazy" /></div>
    <div class="logo-tile" tabindex="0"><img src="./client-logos/alyssalynch.png" alt="Alyssa Lynch" loading="lazy" /></div>
    <div class="logo-tile" tabindex="0"><img src="./client-logos/linkedin.png" alt="LinkedIn" loading="lazy" /></div>
    <div class="logo-tile" tabindex="0"><img src="./client-logos/back-nine-greens.png" alt="Back Nine Greens" loading="lazy" /></div>
    <div class="logo-tile" tabindex="0"><img src="./client-logos/jama.png" alt="Jama" loading="lazy" /></div>
    <div class="logo-tile" tabindex="0"><img src="./client-logos/cypress-golf.png" alt="Cypress Golf" loading="lazy" /></div>
    <div class="logo-tile" tabindex="0"><img src="./client-logos/bull.png" alt="Bull Boulder" loading="lazy" /></div>
    <div class="logo-tile" tabindex="0"><img src="./client-logos/compass.png" alt="Compass" loading="lazy" /></div>
    <div class="logo-tile" tabindex="0"><img src="./client-logos/im8.png" alt="IM8" loading="lazy" /></div>
    <div class="logo-tile" tabindex="0"><img src="./client-logos/sage-rutty.png" alt="Sage Rutty" loading="lazy" /></div>
  </div>
</main>

<footer>
  <span><a href="mailto:hello@swang.studio">hello@swang.studio</a></span>
  <span>Los Angeles, CA</span>
</footer>

<script>
  (function () {
    const el = document.getElementById('typer');
    const phrases = ['Meta Creatives','Brand Visibility','Content Creation','Graphic Design','Advertising Strategy'];
    const typeSpeed=150, deleteSpeed=75, holdEnd=5000, holdStart=1200;
    let p=3, c=0, del=false;   // clients starts on Graphic Design
    function tick(){
      const ph=phrases[p]; c+=del?-1:1;
      el.textContent=ph.substring(0,c);
      if(!del&&c===ph.length){del=true;setTimeout(tick,holdEnd);return;}
      if(del&&c<=0){c=0;del=false;p=(p+1)%phrases.length;setTimeout(tick,holdStart);return;}
      setTimeout(tick,del?deleteSpeed:typeSpeed);
    }
    el.textContent=''; setTimeout(tick,600);
  })();
</script>

</body>
</html>
