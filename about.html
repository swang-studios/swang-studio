<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="alternate icon" href="/favicon.svg" />

<!-- Open Graph / Twitter share card -->

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#ffffff; --ink:#000000; --mute:#6e6e6e; --rule:rgba(0,0,0,0.10); }
  html, body { min-height: 100%; }
  body {
    font-family: 'Hanken Grotesk', -apple-system, system-ui, sans-serif;
    font-size: 14px; line-height: 1.5; color: var(--ink); background: var(--bg);
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  ::selection { background: var(--ink); color: var(--bg); }
  a { color: inherit; text-decoration: none; }

  /* HEADER */
  header {
    flex: 0 0 auto;
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; padding: 18px 28px;
    border-bottom: 1px solid var(--rule);
    background: var(--bg); gap: 32px;
  }
  .name {
    justify-self: start; font-weight: 700; font-size: 15px;
    letter-spacing: -0.025em; color: var(--ink);
    display: inline-flex; align-items: baseline; gap: 6px;
    border-bottom: 1px solid transparent; padding-bottom: 1px;
    transition: border-color 150ms;
  }
  .name .arrow {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-weight: 500; font-size: 13px; color: var(--mute);
    transition: transform 200ms, color 200ms;
  }
  .name:hover { border-bottom-color: var(--ink); }
  .name:hover .arrow { transform: translateX(-2px); color: var(--ink); }
  .typer-wrap {
    justify-self: center; display: inline-flex; align-items: center;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap;
  }
  #typer { color: var(--ink); font-weight: 600; }
  .cursor {
    display: inline-block; width: 7px; height: 14px; background: var(--ink);
    margin-left: 3px; transform: translateY(2px);
    animation: blink 1.05s steps(2, start) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  nav.primary { justify-self: end; display: flex; align-items: center; gap: 18px; }
  nav.primary a {
    font-size: 13px; font-weight: 500; letter-spacing: -0.005em;
    color: var(--ink); padding: 4px 0;
    border-bottom: 1px solid transparent;
    transition: border-color 150ms; white-space: nowrap;
  }
  nav.primary a:hover, nav.primary a.active { border-bottom-color: var(--ink); }
  nav.primary .pipe { color: var(--rule); font-weight: 300; user-select: none; }

  /* ABOUT BODY */
  main.about-stage {
    flex: 1 1 auto;
    display: flex; flex-direction: column; align-items: center;
    padding: clamp(48px, 8vh, 96px) 28px;
  }
  .about-content {
    max-width: 640px; width: 100%;
    display: flex; flex-direction: column;
    gap: clamp(32px, 5vh, 56px);
  }
  .about-content .title {
    font-weight: 800;
    font-size: clamp(48px, 7vw, 88px);
    line-height: 0.98; letter-spacing: -0.04em;
    color: var(--ink);
  }
  .about-content .bio {
    /* Empty body — Mason fills later. min-height holds the shape. */
    min-height: 1.6em;
    font-size: clamp(15px, 1.4vw, 17px);
    line-height: 1.65;
    color: var(--ink);
  }
  .about-content .rule {
    height: 1px; background: var(--rule); width: 100%;
  }
  .contact-line {
    display: flex; align-items: baseline; flex-wrap: wrap;
    gap: 14px;
  }
  .contact-line .label {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-weight: 500;
    font-size: clamp(12px, 1.1vw, 14px);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--mute);
  }
  .contact-line .sep {
    font-family: 'Geist Mono', ui-monospace, monospace;
    color: var(--mute);
  }
  .contact-line a {
    font-weight: 700;
    font-size: clamp(18px, 2vw, 26px);
    letter-spacing: -0.02em;
    color: var(--ink);
    position: relative;
  }
  .contact-line a::after {
    content: ''; position: absolute; left: 0; bottom: -0.05em;
    width: 0; height: 0.06em; background: var(--ink);
    transition: width 240ms cubic-bezier(.4,0,.2,1);
  }
  .contact-line a:hover::after { width: 100%; }

  /* FOOTER */
  footer {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px; border-top: 1px solid var(--rule);
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--ink); gap: 16px; flex-wrap: wrap;
  }
  footer a { border-bottom: 1px solid transparent; transition: border-color 150ms; }
  footer a:hover { border-bottom-color: var(--ink); }

  @media (max-width: 980px) {
    header { grid-template-columns: auto 1fr; gap: 14px; }
    .typer-wrap { display: none; }
    nav.primary { justify-self: end; gap: 12px; }
    nav.primary a { font-size: 12px; }
  }
  @media (max-width: 520px) {
    header { padding: 14px 18px; }
    nav.primary .pipe { display: none; }
    nav.primary a { font-size: 11px; }
    footer { padding: 12px 18px; font-size: 10px; flex-direction: column; align-items: flex-start; gap: 4px; }
  }
</style>
</head>
<body>

<header>
  <a href="./index.html" class="name"><span class="arrow">←</span> Mason Swanger</a>
  <div class="typer-wrap" aria-hidden="true">
    <span id="typer">Meta Creatives</span>
    <span class="cursor"></span>
  </div>
  <nav class="primary">
    <a href="./gallery.html">Gallery</a>
    <span class="pipe">|</span>
    <a href="./case-studies.html">Case Studies</a>
    <span class="pipe">|</span>
    <a href="./clients.html">Clients</a>
  </nav>
</header>

<main class="about-stage">
  <div class="about-content">
    <h1 class="title">About</h1>
    <div class="bio"></div>
    <div class="rule"></div>
    <div class="contact-line">
      <span class="label">Contact</span>
      <span class="sep">—</span>
      <a href="mailto:hello@swang.studio">hello@swang.studio</a>
    </div>
  </div>
</main>

<footer>
  <span><a href="mailto:hello@swang.studio">hello@swang.studio</a></span>
  <span>Los Angeles, CA</span>
</footer>

<script>
  (function () {
    const el = document.getElementById('typer');
    const phrases = ['Meta Creatives','Brand Visibility','Content Creation','Graphic Design','Advertising Strategy'];
    const typeSpeed=110, deleteSpeed=55, holdEnd=3400, holdStart=800;
    let p=0, c=0, del=false;
    function tick(){
      const ph=phrases[p]; c+=del?-1:1;
      el.textContent=ph.substring(0,c);
      if(!del&&c===ph.length){del=true;setTimeout(tick,holdEnd);return;}
      if(del&&c===0){del=false;p=(p+1)%phrases.length;setTimeout(tick,holdStart);return;}
      setTimeout(tick,del?deleteSpeed:typeSpeed);
    }
    el.textContent=''; setTimeout(tick,600);
  })();
</script>

</body>
</html>
